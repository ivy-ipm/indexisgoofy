<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrabVR Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:linear-gradient(160deg,#a0d8f1,#bfe6fb,#a0d8f1);color:#000}
header{position:sticky;top:0;display:flex;justify-content:space-between;padding:10px 20px;background:rgba(255,255,255,0.5);backdrop-filter:blur(10px)}
nav button{margin:0 5px;padding:6px 12px;border:none;border-radius:8px;background:rgba(255,255,255,0.2);cursor:pointer}
main section{display:none;padding:20px}
.active{display:block}
#toolButtons button{margin:5px;padding:6px 12px;border:none;border-radius:8px;background:rgba(255,255,255,0.2);cursor:pointer}
.toolUI{margin-top:10px;padding:15px;border-radius:10px;background:rgba(255,255,255,0.15)}
input,button{font-family:'Poppins';margin:5px 0;padding:6px;border:none;border-radius:6px}
.level{background:rgba(255,255,255,0.2);padding:10px;border-radius:8px;margin:5px 0}
#loginBox{display:none;position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.6);padding:20px;border-radius:10px}
#themeToggle{position:fixed;bottom:20px;right:20px;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#5fa9f3;color:#fff;cursor:pointer}
footer{text-align:center;margin:50px 0 20px 0;font-size:0.9rem}
</style>
</head>
<body>

<header>
<div>GrabVR Suite</div>
<nav>
<button id="navHome">Homepage</button>
<button id="navTools">Tools</button>
<button id="navGames">Games</button>
<button id="navLogin">User Login</button>
</nav>
</header>

<main>
<section id="homepage" class="active">
<h1>Welcome to GrabVR Suite</h1>
<p>Created by the Pakiv team (Pakker + Ivy). Explore GrabVR tools, games, and utilities all in one place.</p>
</section>

<section id="tools">
<div id="toolButtons"></div>

<div id="playerTool" class="toolUI" style="display:none">
<input id="playerUrl" placeholder="Level URL">
<button id="lookupBtn">Lookup</button>
<div id="levels"></div>
</div>

<div id="downloadTool" class="toolUI" style="display:none">
<input id="lvlUrl" placeholder="Level URL">
<input id="fileName" placeholder="File name">
<button id="downloadManual">Download</button>
</div>

</section>

<section id="games">
<h2>Coming Soon</h2>
</section>
</main>

<div id="loginBox">
<input id="loginUsername" placeholder="Username">
<button id="loginSubmit">Login</button>
</div>

<div id="themeToggle">🌙</div>

<footer>
made by ivy • by love from poizonTools team • <a href="https://discord.gg/G6aNgvM7j9" target="_blank">discord.gg/G6aNgvM7j9</a><br>© 2026
</footer>

<script>
const sections={
home:document.getElementById("homepage"),
tools:document.getElementById("tools"),
games:document.getElementById("games")
};

function show(s){
Object.values(sections).forEach(x=>x.classList.remove("active"));
sections[s].classList.add("active");
}

navHome.onclick=()=>show("home");
navTools.onclick=()=>show("tools");
navGames.onclick=()=>show("games");

navLogin.onclick=()=>loginBox.style.display="block";
loginSubmit.onclick=()=>{
const name=loginUsername.value.trim();
if(name){
navLogin.textContent=name;
loginBox.style.display="none";
}
};

const toolButtons=document.getElementById("toolButtons");
const playerTool=document.getElementById("playerTool");
const downloadTool=document.getElementById("downloadTool");

["Player Lookup","Level Downloader"].forEach(name=>{
const b=document.createElement("button");
b.textContent=name;
b.onclick=()=>{
playerTool.style.display="none";
downloadTool.style.display="none";
if(name==="Player Lookup")playerTool.style.display="block";
if(name==="Level Downloader")downloadTool.style.display="block";
};
toolButtons.appendChild(b);
});

lookupBtn.onclick=async()=>{
const url=playerUrl.value;
const id=url.split("level=")[1]?.split(":")[0];
if(!id)return alert("invalid url");

levels.innerHTML="Loading...";

try{
const res=await fetch(`https://api.slin.dev/grab/v1/list/${id}`);
const data=await res.json();

levels.innerHTML="";
data.levels.forEach(l=>{
const div=document.createElement("div");
div.className="level";

const btn=document.createElement("button");
btn.textContent="Download";
btn.onclick=()=>{
const a=document.createElement("a");
a.href=`https://api.slin.dev/grab/v1/download/${l.id}`;
a.download=l.name+".level";
a.click();
};

div.innerHTML=`<b>${l.name}</b><br>`;
div.appendChild(btn);
levels.appendChild(div);
});

}catch{
levels.innerHTML="Failed";
}
};

downloadManual.onclick=()=>{
const url=lvlUrl.value;
const name=fileName.value||"level";
const id=url.split("level=")[1]?.split(":")[0];
if(!id)return alert("invalid url");

const a=document.createElement("a");
a.href=`https://api.slin.dev/grab/v1/download/${id}`;
a.download=name+".level";
a.click();
};

let night=false;
themeToggle.onclick=()=>{
night=!night;
document.body.style.background=night?"linear-gradient(160deg,#000,#222,#000)":"linear-gradient(160deg,#a0d8f1,#bfe6fb,#a0d8f1)";
document.body.style.color=night?"#fff":"#000";
themeToggle.textContent=night?"☀️":"🌙";
};
</script>

</body>
</html>
