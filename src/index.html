<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrabVR Suite</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg, rgba(160,216,241,0.6), rgba(255,255,255,0.6), rgba(160,216,241,0.6));
  backdrop-filter: blur(10px);
  transition: background 0.5s;
  color:#000;
}
header{
  position:sticky;
  top:0;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(8px);
  display:flex;
  justify-content: space-between;
  align-items:center;
  padding:10px 20px;
  z-index:1000;
}
header h1{
  font-weight:600;
  margin:0;
  font-size:1.2rem;
}
nav button{
  margin:0 5px;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(5px);
  border:none;
  border-radius:8px;
  color:#000;
  padding:5px 12px;
  cursor:pointer;
  transition: all 0.3s;
}
nav button:hover{
  background: rgba(95,169,243,0.5);
  color:#fff;
}
#tool-box{
  margin:20px auto;
  max-width:800px;
  border-radius:10px;
  padding:20px;
  min-height:200px;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(5px);
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.tool-btn{
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(5px);
  border:none;
  border-radius:8px;
  color:#000;
  padding:7px 14px;
  cursor:pointer;
  transition: all 0.3s;
}
.tool-btn:hover{
  background: rgba(95,169,243,0.5);
  color:#fff;
}
#login-modal, #profile-modal{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  border-radius:10px;
  padding:25px;
  z-index:1001;
  min-width:300px;
}
#login-modal input{
  width:100%;
  margin:5px 0;
  padding:8px;
  border:none;
  border-radius:5px;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(5px);
}
#login-modal button,#profile-modal button{
  margin:5px 0;
  padding:7px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(5px);
}
#login-modal button:hover,#profile-modal button:hover{
  background: rgba(95,169,243,0.5);
  color:#fff;
}
#theme-toggle{
  position:fixed;
  bottom:20px;
  right:20px;
  width:50px;
  height:50px;
  border-radius:50%;
  background: rgba(95,169,243,0.7);
  color:#fff;
  font-size:1.5rem;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:all 0.5s;
}
footer{
  text-align:center;
  margin:50px 0 20px 0;
  font-size:0.9rem;
}
.dropdown{
  position:relative;
  display:inline-block;
}
.dropdown-content{
  display:none;
  position:absolute;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(8px);
  min-width:150px;
  border-radius:5px;
  z-index:1002;
}
.dropdown-content button{
  display:block;
  width:100%;
  text-align:left;
  border:none;
  background:transparent;
  padding:5px 10px;
  cursor:pointer;
}
.dropdown-content button:hover{
  background: rgba(95,169,243,0.5);
  color:#fff;
}
.dropdown:hover .dropdown-content{
  display:block;
}
</style>
</head>
<body>
<header>
<h1>GrabVR Suite</h1>
<nav>
<button id="tools-btn">Tools</button>
<button id="games-btn">Games</button>
<div class="dropdown">
<button>File</button>
<div class="dropdown-content">
<button id="import-file">Import JSON/.level</button>
<button id="export-file">Export JSON/.level</button>
</div>
</div>
<button id="login-btn">Grab Login</button>
</nav>
</header>

<div id="tool-box"></div>

<div id="login-modal">
<button id="login-close">X</button>
<h3>Login</h3>
<input type="text" id="username" placeholder="Enter Username">
<input type="text" id="level-url" placeholder="Enter Level URL">
<button id="login-submit">Login</button>
</div>

<div id="profile-modal">
<button id="profile-close">X</button>
<h3>Profile Management</h3>
<p id="profile-username"></p>
<button id="logout-btn">Logout</button>
<p>Coming Soon: Profile Settings</p>
</div>

<div id="theme-toggle">🌙</div>

<footer>
&copy;2026 | <a href="#">Discord</a> | Made by Ivy
</footer>

<script>
// DOM glitch fix
let isNight=false;
const toolBox=document.getElementById('tool-box');
const loginModal=document.getElementById('login-modal');
const profileModal=document.getElementById('profile-modal');
const loginBtn=document.getElementById('login-btn');
const themeToggle=document.getElementById('theme-toggle');

const tools=[
{name:'Level Complexity Analyzer',action:()=>{toolBox.innerHTML='<p>Analyzing level complexity...</p>';}},
{name:'Player Lookup',action:()=>{toolBox.innerHTML='<p>Looking up player info...</p>';}},
{name:'OBJ to SGM Converter',action:()=>{toolBox.innerHTML='<p>Convert OBJ to SGM loaded.</p>';}},
{name:'Image to Pixel Art Level',action:()=>{toolBox.innerHTML='<p>Image to Pixel Art Level loaded.</p>';}},
{name:'Image to 3D Map',action:()=>{toolBox.innerHTML='<p>Image to 3D Map loaded.</p>';}},
{name:'Grab JSON Editor',action:()=>{toolBox.innerHTML='<p>Redirecting to JSON Editor...</p>'; window.location.href='/grabeditor';}}
];

function renderTools(){
toolBox.innerHTML='';
tools.forEach(t=>{
const btn=document.createElement('button');
btn.className='tool-btn';
btn.textContent=t.name;
btn.onclick=t.action;
toolBox.appendChild(btn);
});
}

renderTools();

loginBtn.onclick=()=>{loginModal.style.display='block';};
document.getElementById('login-close').onclick=()=>{loginModal.style.display='none';};
document.getElementById('profile-close').onclick=()=>{profileModal.style.display='none';};

document.getElementById('login-submit').onclick=()=>{
const username=document.getElementById('username').value.trim();
const levelURL=document.getElementById('level-url').value.trim();
let userID='';
if(levelURL.includes('level=')){
userID=levelURL.split('level=')[1].split(':')[1]||levelURL.split('level=')[1].split('/')[0];
}
if(username){loginBtn.textContent=username;loginModal.style.display='none';profileModal.style.display='block';document.getElementById('profile-username').textContent=`Username: ${username} | UserID: ${userID}`;}};

themeToggle.onclick=()=>{
isNight=!isNight;
if(isNight){document.body.style.background='linear-gradient(135deg, rgba(0,0,0,0.7), rgba(34,34,34,0.7), rgba(0,0,0,0.7))';themeToggle.textContent='☀️';}
else{document.body.style.background='linear-gradient(135deg, rgba(160,216,241,0.6), rgba(255,255,255,0.6), rgba(160,216,241,0.6))';themeToggle.textContent='🌙';}
};

document.getElementById('import-file').onclick=()=>{alert('Import JSON/.level (not implemented yet)');};
document.getElementById('export-file').onclick=()=>{alert('Export JSON/.level (not implemented yet)');};
</script>
</body>
</html>
