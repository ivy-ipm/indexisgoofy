<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrabVR Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(160deg,#a0d8f1,#bfe6fb,#a0d8f1);
color:#000;
transition:0.4s;
}
header{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
padding:10px 20px;
background:rgba(255,255,255,0.5);
backdrop-filter:blur(10px);
}
nav button{
margin:0 5px;
padding:6px 12px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.2);
cursor:pointer;
}
main section{display:none;padding:20px;}
.active{display:block;}
#toolButtons button{
margin:5px;
padding:6px 12px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.2);
cursor:pointer;
}
#toolBox{
margin-top:10px;
padding:15px;
border-radius:10px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
}
input,button{
font-family:'Poppins';
margin:5px 0;
padding:6px;
border:none;
border-radius:6px;
}
canvas{max-width:100%;}
#themeToggle{
position:fixed;
bottom:20px;
right:20px;
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:#5fa9f3;
color:#fff;
cursor:pointer;
}
</style>
</head>
<body>

<header>
<div>GrabVR Suite</div>
<nav>
<button id="navHome">Homepage</button>
<button id="navTools">Tools</button>
<button id="navGames">Games</button>
</nav>
</header>

<main>
<section id="homepage" class="active">
<h1>Welcome</h1>
<p>Real working tools.</p>
</section>

<section id="tools">
<div id="toolButtons"></div>
<div id="toolBox"></div>
</section>

<section id="games">
<h2>Coming Soon</h2>
</section>
</main>

<div id="themeToggle">🌙</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

const sections={
home:document.getElementById("homepage"),
tools:document.getElementById("tools"),
games:document.getElementById("games")
};

function show(s){
Object.values(sections).forEach(x=>x.classList.remove("active"));
sections[s].classList.add("active");
}

document.getElementById("navHome").onclick=()=>show("home");
document.getElementById("navTools").onclick=()=>show("tools");
document.getElementById("navGames").onclick=()=>show("games");

const toolBox=document.getElementById("toolBox");
const toolButtons=document.getElementById("toolButtons");

function set(html){toolBox.innerHTML=html;}

const tools=[

{
name:"Level Downloader",
action:()=>set(`
<input id="lvlUrl" placeholder="Level URL">
<input id="fileName" placeholder="File name">
<button onclick="downloadLevel()">Download</button>
`)
},

{
name:"Player Lookup",
action:()=>set(`
<input id="playerUrl" placeholder="Level URL">
<button onclick="lookupPlayer()">Extract User ID</button>
<p id="playerResult"></p>
`)
},

{
name:"Image to Pixel Art",
action:()=>set(`
<input type="file" id="imgInput">
<canvas id="pixelCanvas"></canvas>
`)
},

{
name:"Image to 3D Map",
action:()=>set(`
<input type="file" id="mapInput">
<canvas id="mapCanvas"></canvas>
`)
},

{
name:"Grab JSON Editor",
action:()=>window.location.href="grabeditor.html"
}

];

tools.forEach(t=>{
const b=document.createElement("button");
b.textContent=t.name;
b.onclick=t.action;
toolButtons.appendChild(b);
});

window.downloadLevel=()=>{
const url=document.getElementById("lvlUrl").value;
const name=document.getElementById("fileName").value||"level";
const id=url.split("level=")[1]?.split(":")[0];
if(!id)return alert("invalid url");

const link=`https://api.slin.dev/grab/v1/download/${id}`;
const a=document.createElement("a");
a.href=link;
a.download=name+".level";
a.click();
};

window.lookupPlayer=()=>{
const url=document.getElementById("playerUrl").value;
const id=url.split("level=")[1]?.split(":")[0];
document.getElementById("playerResult").textContent="UserID: "+id;
};

document.addEventListener("change",e=>{
if(e.target.id==="imgInput"){
const file=e.target.files[0];
const img=new Image();
img.onload=()=>{
const c=document.getElementById("pixelCanvas");
const ctx=c.getContext("2d");
c.width=50;c.height=50;
ctx.drawImage(img,0,0,50,50);
};
img.src=URL.createObjectURL(file);
}

if(e.target.id==="mapInput"){
const file=e.target.files[0];
const img=new Image();
img.onload=()=>{
const c=document.getElementById("mapCanvas");
const ctx=c.getContext("2d");
c.width=100;c.height=100;
ctx.drawImage(img,0,0,100,100);
};
img.src=URL.createObjectURL(file);
}
});

let night=false;
document.getElementById("themeToggle").onclick=()=>{
night=!night;
if(night){
document.body.style.background="linear-gradient(160deg,#000,#222,#000)";
document.body.style.color="#fff";
}else{
document.body.style.background="linear-gradient(160deg,#a0d8f1,#bfe6fb,#a0d8f1)";
document.body.style.color="#000";
}
};

});
</script>

</body>
</html>
