<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GrabEditor</title>
<style>
body, html{margin:0;padding:0;font-family:sans-serif;height:100%;background:#1e1e1e;color:#eee;display:flex;flex-direction:column;}
#top-bar{height:40px;background:#2a2a2a;display:flex;align-items:center;padding:0 10px;gap:10px;}
button{background:#3a3a3a;color:#eee;border:none;padding:5px 10px;cursor:pointer;}
button:hover{background:#505050;}
#container{flex:1;display:flex;overflow:hidden;}
#tree-panel{width:250px;background:#252525;overflow:auto;padding:10px;}
#props-panel{width:250px;background:#252525;overflow:auto;padding:10px;}
#editor-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
#canvas3d{width:100%;height:100%;background:#000;}
.node-item{padding:2px 5px;margin:2px 0;border-radius:3px;cursor:pointer;}
.node-item.selected{background:#3a3a3a;}
.prop-section{margin-bottom:10px;}
.prop-section-title{font-weight:bold;margin-bottom:5px;}
.prop-row{display:flex;justify-content:space-between;margin-bottom:3px;}
.prop-input{width:60px;}
.wide{width:100%;}
#add-menu{position:absolute;top:40px;left:10px;background:#2a2a2a;padding:5px;display:none;flex-direction:column;gap:3px;border-radius:3px;}
#add-menu.open{display:flex;}
textarea{width:100%;height:150px;background:#111;color:#eee;border:1px solid #333;padding:5px;resize:none;}
</style>
</head>
<body>
<div id="top-bar">
<button id="btn-add">Add Node</button>
<button id="btn-delete">Delete Node</button>
<button id="btn-copy-json">Copy JSON</button>
<button id="btn-apply-json">Apply JSON</button>
<button id="btn-format-json">Format JSON</button>
<div id="add-menu">
<button onclick="addNode('static','cube')">Static Cube</button>
<button onclick="addNode('group')">Group</button>
<button onclick="addNode('start')">Start</button>
<button onclick="addNode('finish')">Finish</button>
<button onclick="addNode('sign')">Sign</button>
<button onclick="addNode('gravity')">Gravity</button>
<button onclick="addNode('trigger')">Trigger</button>
<button onclick="addNode('sound')">Sound</button>
</div>
</div>
<div id="container">
<div id="tree-panel"></div>
<div id="editor-panel">
<canvas id="canvas3d"></canvas>
<textarea id="json-editor"></textarea>
</div>
<div id="props-panel"></div>
</div>
<script>
const SHAPE={cube:1000,sphere:1001,cylinder:1002};
let level={levelNodes:[]};
let selectedNode=null;
let selectedPath=null;

function markDirty(){renderTree();renderProps();updateJSON();}
function getNodeType(node){
  if(node.levelNodeStatic)return'static';
  if(node.levelNodeGroup)return'group';
  if(node.levelNodeStart)return'start';
  if(node.levelNodeFinish)return'finish';
  if(node.levelNodeSign)return'sign';
  if(node.levelNodeGravity)return'gravity';
  if(node.levelNodeTrigger)return'trigger';
  if(node.levelNodeSound)return'sound';
  return'unknown';
}
function getNodeData(node){
  const t=getNodeType(node);
  return node['levelNode'+t.charAt(0).toUpperCase()+t.slice(1)];
}
function getNodeAtPath(path){
  let nodes=level.levelNodes;let node=null;
  for(let i=0;i<path.length;i++){
    node=nodes[path[i]];
    if(i<path.length-1){
      nodes=node.levelNodeGroup?node.levelNodeGroup.childNodes:[];
    }
  }
  return node;
}
function renderTree(){
  const panel=document.getElementById('tree-panel');panel.innerHTML='';
  function recurse(nodes,path){
    nodes.forEach((node,i)=>{
      const div=document.createElement('div');
      div.className='node-item'+(selectedPath&&selectedPath.join(',')===path.concat(i).join(',')?' selected':'');
      div.textContent=getNodeType(node);
      div.onclick=e=>{
        e.stopPropagation();
        selectedNode=node;selectedPath=path.concat(i);
        markDirty();
      };
      panel.appendChild(div);
      if(node.levelNodeGroup&&node.levelNodeGroup.childNodes.length>0){
        const childDiv=document.createElement('div');childDiv.style.paddingLeft='15px';
        div.appendChild(childDiv);
        recurse(node.levelNodeGroup.childNodes,path.concat(i));
      }
    });
  }
  recurse(level.levelNodes,[]);
}
function renderProps(){
  const panel=document.getElementById('props-panel');panel.innerHTML='';
  if(!selectedNode){panel.innerHTML='<div class="no-selection">Select a node to edit its properties.</div>';return;}
  const type=getNodeType(selectedNode);
  const data=getNodeData(selectedNode);
  let html='';
  if(type==='static'||type==='crumbling'){
    html+=`<div class="prop-section">
      <div class="prop-section-title">Transform</div>
      <div class="prop-row"><span class="prop-label">X</span><input class="prop-input" type="number" value="${data.position?.x||0}" oninput="data.position.x=parseFloat(this.value);markDirty()"></div>
      <div class="prop-row"><span class="prop-label">Y</span><input class="prop-input" type="number" value="${data.position?.y||0}" oninput="data.position.y=parseFloat(this.value);markDirty()"></div>
      <div class="prop-row"><span class="prop-label">Z</span><input class="prop-input" type="number" value="${data.position?.z||0}" oninput="data.position.z=parseFloat(this.value);markDirty()"></div>
    </div>`;
  }else if(type==='group'){
    html+=`<div class="prop-section">
      <div class="prop-section-title">Group Name</div>
      <input class="prop-input wide" type="text" value="${data.name||''}" oninput="data.name=this.value;markDirty();renderTree()">
    </div>`;
  }else if(type==='start'||type==='finish'){
    html+=`<div class="prop-section">
      <div class="prop-section-title">${type.charAt(0).toUpperCase()+type.slice(1)} Point</div>
      <div class="prop-row"><span class="prop-label">Radius</span><input class="prop-input" type="number" value="${data.radius||1}" oninput="data.radius=parseFloat(this.value);markDirty()"></div>
    </div>`;
  }else if(type==='sign'){
    html+=`<div class="prop-section">
      <div class="prop-section-title">Sign</div>
      <div class="prop-row"><span class="prop-label">Text</span><input class="prop-input wide" type="text" value="${data.text||''}" oninput="data.text=this.value;markDirty()"></div>
    </div>`;
  }
  panel.innerHTML=html;
}
function addNode(type,shape){
  const newNode={};
  if(type==='static'){newNode.levelNodeStatic={shape:SHAPE[shape]||1000,material:0,position:{x:0,y:0,z:0},scale:{x:1,y:1,z:1},rotation:{w:1},color1:{r:1,g:1,b:1,a:1},isNeon:false,isTransparent:false};}
  else if(type==='group'){newNode.levelNodeGroup={name:'New Group',childNodes:[],position:{x:0,y:0,z:0},scale:{x:1,y:1,z:1},rotation:{w:1}};}
  else if(type==='start'){newNode.levelNodeStart={position:{x:0,y:0,z:0},rotation:{w:1},radius:1,name:'Start'};}
  else if(type==='finish'){newNode.levelNodeFinish={position:{x:0,y:0,z:0},radius:1};}
  else if(type==='sign'){newNode.levelNodeSign={position:{x:0,y:0,z:0},rotation:{w:1},text:'Sign',scale:1};}
  else if(type==='gravity'){newNode.levelNodeGravity={position:{x:0,y:0,z:0},scale:{x:1,y:1,z:1},rotation:{w:1},mode:0};}
  else if(type==='trigger'){newNode.levelNodeTrigger={position:{x:0,y:0,z:0},scale:{x:1,y:1,z:1},rotation:{w:1}};}
  else if(type==='sound'){newNode.levelNodeSound={position:{x:0,y:0,z:0},name:'Sound'};}
  if(selectedNode&&selectedNode.levelNodeGroup){selectedNode.levelNodeGroup.childNodes.push(newNode);}
  else{level.levelNodes.push(newNode);}
  markDirty();
  renderTree();
}
function deleteSelected(){
  if(!selectedPath)return;
  let nodes=level.levelNodes;
  for(let i=0;i<selectedPath.length-1;i++){
    const node=nodes[selectedPath[i]];
    nodes=node.levelNodeGroup?node.levelNodeGroup.childNodes:[];
  }
  nodes.splice(selectedPath[selectedPath.length-1],1);
  selectedNode=null;
  selectedPath=null;
  markDirty();
}
function updateJSON(){
  document.getElementById('json-editor').value=JSON.stringify(level,null,2);
}
function applyJSON(){
  try{
    const val=JSON.parse(document.getElementById('json-editor').value);
    level=val;selectedNode=null;selectedPath=null;markDirty();
  }catch(e){alert('Invalid JSON');}
}
function formatJSON(){updateJSON();}
document.getElementById('btn-add').onclick=e=>{
  document.getElementById('add-menu').classList.toggle('open');
};
document.getElementById('btn-delete').onclick=deleteSelected;
document.getElementById('btn-copy-json').onclick=()=>{navigator.clipboard.writeText(JSON.stringify(level,null,2));};
document.getElementById('btn-apply-json').onclick=applyJSON;
document.getElementById('btn-format-json').onclick=formatJSON;
updateJSON();
renderTree();
renderProps();
</script>
</body>
</html>
