<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grab JSON Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(160deg,#a0d8f1,#bfe6fb,#a0d8f1);
  color:#000;
  transition:0.3s;
}
header {
  position: sticky;
  top:0;
  display:flex;
  justify-content: space-between;
  align-items:center;
  padding:10px 20px;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(10px);
  z-index:1000;
}
nav button {
  margin:0 5px;
  padding:6px 12px;
  border:none;
  border-radius:8px;
  background: rgba(255,255,255,0.2);
  cursor:pointer;
  transition:0.2s;
}
nav button:hover {
  background: rgba(95,169,243,0.5);
  color:#fff;
}
main {
  padding:20px;
}
#editorContainer {
  display:flex;
  gap:20px;
  flex-wrap: wrap;
}
#jsonEditor {
  flex:1;
  height:400px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(5px);
  border:none;
  border-radius:8px;
  padding:10px;
  font-family:'Poppins';
  resize:none;
}
#editor3D {
  flex:1;
  height:400px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(5px);
  border-radius:8px;
  overflow:hidden;
}
.tool-buttons {
  margin-top:10px;
}
.tool-buttons button {
  padding:6px 12px;
  margin:0 5px 5px 0;
  border:none;
  border-radius:8px;
  background: rgba(95,169,243,0.5);
  color:#fff;
  cursor:pointer;
  transition:0.2s;
}
.tool-buttons button:hover {
  background: rgba(95,169,243,0.7);
}
footer {
  text-align:center;
  margin:50px 0 20px 0;
  font-size:0.9rem;
}
</style>
</head>
<body>
<header>
<div>Grab JSON Editor</div>
<nav>
<button onclick="window.location.href='index.html'">Home</button>
</nav>
</header>
<main>
<h1>Grab JSON Level Editor</h1>
<p>Edit and preview your GrabVR levels in real-time 3D. Place objects, edit metadata, and export valid .level files.</p>
<div id="editorContainer">
<textarea id="jsonEditor" placeholder="Level JSON will appear here"></textarea>
<div>
<div id="editor3D"></div>
<div class="tool-buttons">
<button class="addNode" data-type="cube">Add Cube</button>
<button class="addNode" data-type="sphere">Add Sphere</button>
<button class="addNode" data-type="platform">Add Platform</button>
<button id="exportLevel">Export .level</button>
<input type="file" id="importLevel" accept=".level,.json" style="margin-top:10px;">
</div>
</div>
</div>
</main>
<footer>
made by ivy • by love from poizonTools team • <a href="https://discord.gg/G6aNgvM7j9" target="_blank">discord.gg/G6aNgvM7j9</a><br>© 2026
</footer>
<script src="https://cdn.jsdelivr.net/npm/three@0.156.0/build/three.min.js"></script>
<script>
let scene, camera, renderer;
let nodes = [];
const jsonEditor = document.getElementById('jsonEditor');
const editor3D = document.getElementById('editor3D');

function init3D() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, editor3D.clientWidth/editor3D.clientHeight, 0.1, 1000);
  camera.position.set(0,5,10);
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(editor3D.clientWidth, editor3D.clientHeight);
  editor3D.appendChild(renderer.domElement);
  const light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(5,10,7.5);
  scene.add(light);
  const ambient = new THREE.AmbientLight(0x404040);
  scene.add(ambient);
  animate();
}
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
function addNode(type){
  let geo, mat;
  if(type==='cube'){geo=new THREE.BoxGeometry(1,1,1);}
  else if(type==='sphere'){geo=new THREE.SphereGeometry(0.5,16,16);}
  else if(type==='platform'){geo=new THREE.BoxGeometry(3,0.2,3);}
  mat = new THREE.MeshStandardMaterial({color:0x5fa9f3});
  const mesh = new THREE.Mesh(geo,mat);
  mesh.position.set(Math.random()*5-2.5,1,Math.random()*5-2.5);
  scene.add(mesh);
  nodes.push({type,x:mesh.position.x,y:mesh.position.y,z:mesh.position.z});
  updateJSON();
}
function updateJSON(){
  const levelJSON = {
    formatVersion:17,
    title:"New Level",
    creators:"username",
    description:"",
    tags:[],
    maxCheckpointCount:10,
    ambienceSettings:{},
    levelNodes:nodes
  };
  jsonEditor.value = JSON.stringify(levelJSON,null,2);
}
document.querySelectorAll('.addNode').forEach(btn=>{btn.onclick=()=>addNode(btn.dataset.type);});
document.getElementById('exportLevel').onclick=()=>{
  const blob = new Blob([jsonEditor.value],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download='level.level';
  a.click();
};
document.getElementById('importLevel').onchange=function(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      nodes=data.levelNodes||[];
      while(scene.children.length>2){scene.remove(scene.children[2]);}
      nodes.forEach(n=>addNode(n.type));
      jsonEditor.value=JSON.stringify(data,null,2);
    }catch(err){alert('Invalid JSON');}
  };
  reader.readAsText(file);
};
window.addEventListener('resize',()=>{camera.aspect=editor3D.clientWidth/editor3D.clientHeight;camera.updateProjectionMatrix();renderer.setSize(editor3D.clientWidth,editor3D.clientHeight);});
init3D();
</script>
</body>
</html>
