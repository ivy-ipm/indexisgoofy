<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grab JSON Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:linear-gradient(160deg,#FFD194,#D1913C,#FFD194);color:#000;transition:0.3s;overflow:hidden}
header{display:flex;justify-content:space-between;padding:10px 20px;background:rgba(255,255,255,0.6);backdrop-filter:blur(10px)}
header div{font-weight:600;font-size:1.2rem}
#editorContainer{display:flex;height:calc(100vh - 60px)}
#blockPanel{width:200px;background:rgba(255,255,255,0.2);backdrop-filter:blur(8px);padding:10px;overflow-y:auto}
#blockPanel h3{margin-top:0}
.block{margin:5px;padding:5px;background:rgba(255,255,255,0.3);cursor:pointer;text-align:center;border-radius:6px;transition:0.2s}
.block:hover{background:rgba(95,169,243,0.5);color:#fff}
#mainView{flex:1;position:relative;background:#a0d8f1;display:flex;flex-direction:column}
#threeContainer{flex:1}
#rawJson{height:150px;width:100%;font-family:monospace;border:none;padding:10px;box-sizing:border-box;background:rgba(255,255,255,0.2);color:#000;overflow:auto;resize:none}
#templateBtn{margin:5px;padding:6px;border:none;border-radius:6px;background:#5fa9f3;color:#fff;cursor:pointer}
</style>
</head>
<body>
<header>
<div>Grab JSON Editor</div>
<button id="templateBtn">Templates</button>
</header>
<div id="editorContainer">
<div id="blockPanel">
<h3>Blocks</h3>
<div class="block" data-type="1">Grass</div>
<div class="block" data-type="2">Stone</div>
<div class="block" data-type="3">Water</div>
<div class="block" data-type="4">Sand</div>
<div class="block" data-type="5">Wood</div>
</div>
<div id="mainView">
<div id="threeContainer"></div>
<textarea id="rawJson" placeholder="Level JSON will appear here"></textarea>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/controls/OrbitControls.js"></script>
<script>
let scene, camera, renderer, controls;
let levelData = {blocks:[]};
const blockSize = 1;
const blockTypes = {
1:0x3CB371,
2:0xA9A9A9,
3:0x1E90FF,
4:0xFFD700,
5:0x8B4513
};
function initThree(){
scene=new THREE.Scene();
camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth-200,window.innerHeight-60);
document.getElementById("threeContainer").appendChild(renderer.domElement);
controls=new THREE.OrbitControls(camera,renderer.domElement);
camera.position.set(5,10,15);
controls.update();
const light=new THREE.DirectionalLight(0xffffff,1);light.position.set(10,20,10);scene.add(light);
const amb=new THREE.AmbientLight(0xcccccc);scene.add(amb);
animate();
}
function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);}
function addBlock(x,y,z,type){const geometry=new THREE.BoxGeometry(blockSize,blockSize,blockSize);
const material=new THREE.MeshStandardMaterial({color:blockTypes[type]||0xffffff});
const cube=new THREE.Mesh(geometry,material);cube.position.set(x,y,z);scene.add(cube);
levelData.blocks.push({x,y,z,type});updateRaw();}
function removeBlock(x,y,z){const found=levelData.blocks.findIndex(b=>b.x===x&&b.y===y&&b.z===z);if(found!==-1){
levelData.blocks.splice(found,1);updateScene();updateRaw();}}
function updateScene(){while(scene.children.length>2)scene.remove(scene.children[2]);levelData.blocks.forEach(b=>addBlockVisual(b));}
function addBlockVisual(b){const geometry=new THREE.BoxGeometry(blockSize,blockSize,blockSize);
const material=new THREE.MeshStandardMaterial({color:blockTypes[b.type]||0xffffff});
const cube=new THREE.Mesh(geometry,material);cube.position.set(b.x,b.y,b.z);scene.add(cube);}
function updateRaw(){document.getElementById("rawJson").value=JSON.stringify(levelData,null,2);}
document.querySelectorAll(".block").forEach(b=>b.addEventListener("click",()=>{
const type=parseInt(b.getAttribute("data-type"));
const x=Math.floor(Math.random()*5);const y=Math.floor(Math.random()*5);const z=Math.floor(Math.random()*5);
addBlock(x,y,z,type);
}));
document.getElementById("rawJson").addEventListener("change",()=>{
try{levelData=JSON.parse(document.getElementById("rawJson").value);updateScene();}catch(e){alert("Invalid JSON")}});

document.getElementById("templateBtn").onclick=()=>{
const templates=[{name:"Lobby 1",blocks:[{x:0,y:0,z:0,type:1},{x:1,y:0,z:0,type:2}]},
{name:"Lobby 2",blocks:[{x:0,y:0,z:0,type:3},{x:0,y:1,z:0,type:4}]}];
let t=prompt("Select template:\n1: Lobby 1\n2: Lobby 2","1");t=parseInt(t);if(t>=1&&t<=templates.length){
levelData=JSON.parse(JSON.stringify(templates[t-1]));updateScene();updateRaw();}
};
window.addEventListener("resize",()=>{camera.aspect=(window.innerWidth-200)/ (window.innerHeight-60);camera.updateProjectionMatrix();renderer.setSize(window.innerWidth-200,window.innerHeight-60);});
initThree();
</script>
</body>
</html>
