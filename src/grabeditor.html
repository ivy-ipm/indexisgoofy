<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrabVR JSON Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:linear-gradient(160deg,#a0d8f1,#bfe6fb,#a0d8f1);color:#000;transition:0.3s;overflow:hidden}
header{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:rgba(255,255,255,0.6);backdrop-filter:blur(10px)}
header h1{margin:0;font-size:1.2rem}
#editorContainer{position:relative;width:100%;height:calc(100vh - 50px);display:flex;flex-direction:row;overflow:hidden}
#toolPanel{width:240px;background:rgba(255,255,255,0.15);backdrop-filter:blur(5px);padding:10px;overflow-y:auto}
#canvasWrapper{flex:1;position:relative;background:#111;display:flex;align-items:center;justify-content:center}
canvas{width:100%;height:100%;display:block}
#jsonPanel{position:absolute;top:0;right:0;width:300px;height:100%;background:rgba(0,0,0,0.85);color:#fff;overflow:auto;padding:10px;display:none;z-index:10}
button,input,select{font-family:'Poppins';margin:5px 0;padding:6px;border:none;border-radius:6px;cursor:pointer}
button:hover{background:rgba(95,169,243,0.5);color:#fff}
#fileActions{display:flex;flex-direction:column;margin-bottom:10px}
#fileActions button{width:100%}
</style>
</head>
<body>
<header>
<h1>GrabVR JSON Editor</h1>
<div>
<button id="toggleJSON">Raw JSON</button>
<button id="newTemplate">Template</button>
</div>
</header>
<div id="editorContainer">
<div id="toolPanel">
<div id="fileActions">
<button id="newLevel">New Level</button>
<button id="openLevel">Open Level File</button>
<button id="saveLevel">Save Level</button>
<button id="exportJSON">Export JSON</button>
</div>
<div id="insertTools">
<h3>Insert</h3>
<select id="insertType">
<option value="cube">Cube</option>
<option value="sphere">Sphere</option>
<option value="cylinder">Cylinder</option>
<option value="pyramid">Pyramid</option>
<option value="prism">Prism</option>
<option value="cone">Cone</option>
<option value="sign">Sign</option>
</select>
<button id="addNode">Add Node</button>
</div>
<div id="editTools">
<h3>Edit</h3>
<button id="duplicateNode">Duplicate</button>
<button id="deleteNode">Delete</button>
<button id="clearNodes">Clear All</button>
</div>
<div id="templateList" style="display:none">
<h3>Official Templates</h3>
<ul>
<li><button class="loadTemplate" data-url="https://grabvr.tools/templates/lobby1.json">Lobby 1</button></li>
<li><button class="loadTemplate" data-url="https://grabvr.tools/templates/lobby2.json">Lobby 2</button></li>
<li><button class="loadTemplate" data-url="https://grabvr.tools/templates/cheatsheet.json">Cheat Sheet</button></li>
</ul>
</div>
</div>
<div id="canvasWrapper">
<canvas id="editorCanvas"></canvas>
<div id="jsonPanel"><pre id="jsonContent"></pre></div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.min.js"></script>
<script>
const canvas=document.getElementById("editorCanvas");
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/ window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(canvas.clientWidth,canvas.clientHeight);
camera.position.set(0,5,10);
const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

const levelNodes=[];
function addNode(type){
let geo;
switch(type){
case"cube":geo=new THREE.BoxGeometry(1,1,1);break;
case"sphere":geo=new THREE.SphereGeometry(0.5,16,16);break;
case"cylinder":geo=new THREE.CylinderGeometry(0.5,0.5,1,16);break;
case"pyramid":geo=new THREE.ConeGeometry(0.7,1,4);break;
case"prism":geo=new THREE.CylinderGeometry(0.5,0.5,1,3);break;
case"cone":geo=new THREE.ConeGeometry(0.5,1,32);break;
case"sign":geo=new THREE.BoxGeometry(2,1,0.1);break;
default:geo=new THREE.BoxGeometry(1,1,1);}
const mat=new THREE.MeshStandardMaterial({color:0x5fa9f3});
const mesh=new THREE.Mesh(geo,mat);
mesh.position.set(Math.random()*2-1,0.5,Math.random()*2-1);
scene.add(mesh);
levelNodes.push({type,mesh});
updateJSON();
}
function updateJSON(){
const json={formatVersion:17,title:"New Level",creators:".index-editor",description:".index modding - grab-tools.live",levelNodes:levelNodes.map(n=>({type:n.type,position:n.mesh.position}))};
document.getElementById("jsonContent").textContent=JSON.stringify(json,null,2);
}
function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);}
animate();
window.addNode=addNode;

document.getElementById("addNode").onclick=()=>addNode(document.getElementById("insertType").value);
document.getElementById("duplicateNode").onclick=()=>{if(levelNodes.length>0)addNode(levelNodes[levelNodes.length-1].type);}
document.getElementById("deleteNode").onclick=()=>{if(levelNodes.length>0){scene.remove(levelNodes.pop().mesh);updateJSON();}};
document.getElementById("clearNodes").onclick=()=>{while(levelNodes.length>0){scene.remove(levelNodes.pop().mesh);}updateJSON();}
document.getElementById("toggleJSON").onclick=()=>{
const panel=document.getElementById("jsonPanel");
panel.style.display=panel.style.display==="none"?"block":"none";
};
document.getElementById("newLevel").onclick=()=>{while(levelNodes.length>0){scene.remove(levelNodes.pop().mesh);}updateJSON();};
document.getElementById("newTemplate").onclick=()=>{
const tpl=document.getElementById("templateList");
tpl.style.display=tpl.style.display==="none"?"block":"none";
};
document.querySelectorAll(".loadTemplate").forEach(btn=>{
btn.onclick=async()=>{
const res=await fetch(btn.dataset.url);
const data=await res.json();
while(levelNodes.length>0){scene.remove(levelNodes.pop().mesh);}
data.levelNodes.forEach(n=>addNode(n.type));
};
});
window.addEventListener("resize",()=>{camera.aspect=window.innerWidth/(window.innerHeight);camera.updateProjectionMatrix();renderer.setSize(canvas.clientWidth,canvas.clientHeight);});
const light=new THREE.DirectionalLight(0xffffff,1);light.position.set(5,10,7.5);scene.add(light);
const ambient=new THREE.AmbientLight(0xffffff,0.3);scene.add(ambient);
</script>
</body>
</html>
