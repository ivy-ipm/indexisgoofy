<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grab JSON Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(160deg,#a0d8f1,#bfe6fb,#a0d8f1);
  color:#000;
  transition:0.3s;
}
header {
  position: sticky;
  top:0;
  display:flex;
  justify-content: space-between;
  align-items:center;
  padding:10px 20px;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(10px);
  z-index:1000;
}
nav button {
  margin:0 5px;
  padding:6px 12px;
  border:none;
  border-radius:8px;
  background: rgba(255,255,255,0.2);
  cursor:pointer;
  transition:0.2s;
}
nav button:hover {
  background: rgba(95,169,243,0.5);
  color:#fff;
}
main {
  padding:20px;
}
#editorContainer {
  display:flex;
  gap:20px;
  flex-wrap: wrap;
}
#jsonEditor {
  flex:1;
  height:400px;
  width:100%;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(5px);
  border:none;
  border-radius:8px;
  padding:10px;
  font-family:'Poppins';
  resize:none;
}
#editor3D {
  flex:1;
  height:400px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(5px);
  border-radius:8px;
  perspective:600px;
  overflow:hidden;
  position:relative;
}
#editor3D div {
  width:40px;
  height:40px;
  position:absolute;
  transform-style: preserve-3d;
  background: rgba(95,169,243,0.7);
  border:1px solid #fff;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:4px;
  font-size:0.7rem;
}
.tool-buttons {
  margin-top:10px;
}
.tool-buttons button {
  padding:6px 12px;
  margin:0 5px 5px 0;
  border:none;
  border-radius:8px;
  background: rgba(95,169,243,0.5);
  color:#fff;
  cursor:pointer;
  transition:0.2s;
}
.tool-buttons button:hover {
  background: rgba(95,169,243,0.7);
}
footer {
  text-align:center;
  margin:50px 0 20px 0;
  font-size:0.9rem;
}
</style>
</head>
<body>
<header>
<div>Grab JSON Editor</div>
<nav>
<button onclick="window.location.href='index.html'">Home</button>
</nav>
</header>
<main>
<h1>Grab JSON Level Editor</h1>
<p>Create and edit your GrabVR levels. Place blocks, edit JSON, and export .level files.</p>
<div id="editorContainer">
<textarea id="jsonEditor"></textarea>
<div>
<div id="editor3D"></div>
<div class="tool-buttons">
<button class="addBlock" data-shape="cube">Add Cube</button>
<button class="addBlock" data-shape="sphere">Add Sphere</button>
<button id="exportLevel">Export .level</button>
</div>
</div>
</div>
</main>
<footer>
made by ivy • by love from poizonTools team • <a href="https://discord.gg/G6aNgvM7j9" target="_blank">discord.gg/G6aNgvM7j9</a><br>© 2026
</footer>
<script>
let sceneData = [];
const editor3D = document.getElementById('editor3D');
const jsonEditor = document.getElementById('jsonEditor');

function renderScene(){
  editor3D.innerHTML='';
  sceneData.forEach((obj,idx)=>{
    const el = document.createElement('div');
    el.innerText=obj.type;
    el.style.left=50+idx*45+'px';
    el.style.top=100+'px';
    editor3D.appendChild(el);
  });
  jsonEditor.value = JSON.stringify(sceneData,null,2);
}

document.querySelectorAll('.addBlock').forEach(btn=>{
  btn.onclick=()=>{
    const shape=btn.dataset.shape;
    sceneData.push({type:shape});
    renderScene();
  };
});

document.getElementById('exportLevel').onclick=()=>{
  const blob = new Blob([JSON.stringify(sceneData,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download='level.level';
  a.click();
};
</script>
</body>
</html>
