<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAB Suite Editor</title>
<style>
:root{
  --bg:#0a0a0d;
  --surf:#13131a;
  --surf2:#1c1c26;
  --surf3:#242432;
  --accent:#00e5a0;
  --accent2:#00b87a;
  --muted:#3a3a50;
  --fg:#e8e8f0;
  --red:#ff4060;
  --yellow:#ffd166;
  --blue:#4da6ff;
  --border:#2a2a3a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--fg);font-family:"Courier New",monospace;font-size:12px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#topbar{background:var(--surf);border-bottom:2px solid var(--accent);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;position:fixed;top:0;left:0;right:0;z-index:1000;flex-wrap:wrap;}
#topbar .logo{font-size:16px;font-weight:bold;color:var(--accent);letter-spacing:1px;}
#topbar .logo span{color:var(--fg);}
.tb-btn{background:var(--surf2);color:var(--fg);border:1px solid var(--border);font-family:"Courier New",monospace;font-size:11px;padding:5px 10px;cursor:pointer;white-space:nowrap;}
.tb-btn:hover{background:var(--surf3);border-color:var(--accent);}
.tb-btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:bold;}
.tb-btn.primary:hover{background:var(--accent2);}
.tb-btn.danger{color:var(--red);border-color:var(--red);}
.tb-btn.danger:hover{background:#ff406020;}
.tb-sep{width:1px;height:20px;background:var(--border);margin:0 4px;}
#topbar input[type=text],#topbar textarea{background:var(--surf2);border:1px solid var(--border);color:var(--fg);font-family:"Courier New",monospace;font-size:11px;padding:5px 8px;outline:none;}
#topbar input[type=text]:focus,#topbar textarea:focus{border-color:var(--accent);}
.tb-spacer{flex:1;}
#status-bar{font-size:10px;color:var(--muted);white-space:nowrap;}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden;margin-top:80px;}

/* LEFT PANEL */
#panel-left{width:220px;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
#panel-left .panel-header{padding:8px 12px;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
#panel-left .panel-header .panel-btn{font-size:10px;}
#node-tree{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px;}
.node-item{padding:4px 8px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;align-items:center;gap:4px;user-select:none;}
.node-item:hover{background:var(--surf2);}
.node-item.selected{background:var(--surf3);border-left:2px solid var(--accent);}
.node-color-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.node-label{font-size:11px;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}

/* CENTER PANEL - 3D VIEW */
#panel-center{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden;}
#canvas-container{flex:1;position:relative;overflow:hidden;}
#canvas{width:100%;height:100%;display:block;background:#0a0a0d;}
#view-overlay{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px;pointer-events:none;}
.view-badge{background:rgba(13,13,15,0.8);border:1px solid var(--border);padding:3px 8px;font-size:9px;color:var(--muted);letter-spacing:1px;}
#view-controls{position:absolute;bottom:8px;right:8px;display:flex;gap:4px;}
.view-btn{background:rgba(19,19,26,0.9);color:var(--muted);border:1px solid var(--border);font-family:"Courier New",monospace;font-size:10px;padding:4px 8px;cursor:pointer;}
.view-btn:hover{border-color:var(--accent);color:var(--accent);}

/* RIGHT PANEL - PROPERTIES */
#panel-right{width:280px;background:var(--surf);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
#panel-right .panel-header{padding:8px 12px;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
#properties{flex:1;overflow-y:auto;padding:4px;}
.prop-item{padding:4px 8px;display:flex;justify-content:space-between;align-items:center;font-size:11px;}
.prop-item label{flex:1;}
.prop-item input{flex:1;background:var(--surf2);border:1px solid var(--border);color:var(--fg);padding:2px 4px;font-family:"Courier New",monospace;font-size:11px;}
.prop-item input:focus{border-color:var(--accent);}
#add-node-btn{margin:4px;padding:6px;border:none;background:var(--accent);color:var(--bg);cursor:pointer;font-size:11px;font-family:"Courier New",monospace;}
#add-node-btn:hover{background:var(--accent2);}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">GRABVR <span>Suite</span></div>
  <input type="text" id="level-name" placeholder="Level Name">
  <input type="text" id="level-desc" placeholder="Level Description">
  <button class="tb-btn primary" id="save-btn">Save</button>
  <div class="tb-spacer"></div>
  <div id="status-bar">Ready</div>
</div>

<div id="main">
  <div id="panel-left">
    <div class="panel-header">Nodes <button class="panel-btn" id="add-node-btn">Add Node</button></div>
    <div id="node-tree"></div>
  </div>

  <div id="panel-center">
    <div id="canvas-container">
      <canvas id="canvas"></canvas>
    </div>
    <div id="view-overlay">
      <div class="view-badge" id="node-count">Nodes: 0</div>
    </div>
    <div id="view-controls">
      <button class="view-btn" id="zoom-in">Zoom +</button>
      <button class="view-btn" id="zoom-out">Zoom -</button>
    </div>
  </div>

  <div id="panel-right">
    <div class="panel-header">Properties</div>
    <div id="properties">
      <div class="prop-item">
        <label>Node Name</label>
        <input type="text" id="prop-name">
      </div>
      <div class="prop-item">
        <label>Position X</label>
        <input type="number" id="prop-x">
      </div>
      <div class="prop-item">
        <label>Position Y</label>
        <input type="number" id="prop-y">
      </div>
      <div class="prop-item">
        <label>Position Z</label>
        <input type="number" id="prop-z">
      </div>
      <div class="prop-item">
        <label>Color</label>
        <input type="color" id="prop-color">
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script>
let nodes = [];
let selectedNode = null;
const nodeTree = document.getElementById('node-tree');
const canvas = document.getElementById('canvas');
const levelNameInput = document.getElementById('level-name');
const levelDescInput = document.getElementById('level-desc');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0d);

const camera = new THREE.PerspectiveCamera(70, canvas.clientWidth/canvas.clientHeight, 0.1, 1000);
camera.position.set(5,5,10);

const renderer = new THREE.WebGLRenderer({canvas});
renderer.setSize(canvas.clientWidth, canvas.clientHeight);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,10,10);
scene.add(light);
const ambient = new THREE.AmbientLight(0x404040);
scene.add(ambient);

const skyboxGeo = new THREE.BoxGeometry(100,100,100);
const skyboxMat = new THREE.MeshBasicMaterial({color:0x1a1a2a,side:THREE.BackSide});
const skybox = new THREE.Mesh(skyboxGeo,skyboxMat);
scene.add(skybox);

function addNode(name='Node'){
  const node = {
    id:Date.now(),
    name,
    position:{x:0,y:0,z:0},
    color:'#ffffff',
    mesh:null
  };
  const geo = new THREE.BoxGeometry(1,1,1);
  const mat = new THREE.MeshPhongMaterial({color:0xffffff});
  const mesh = new THREE.Mesh(geo,mat);
  scene.add(mesh);
  node.mesh = mesh;
  nodes.push(node);
  refreshNodeTree();
  updateNodeCount();
}

function refreshNodeTree(){
  nodeTree.innerHTML='';
  nodes.forEach(n=>{
    const div = document.createElement('div');
    div.classList.add('node-item');
    if(selectedNode===n) div.classList.add('selected');
    const colorDot = document.createElement('div');
    colorDot.classList.add('node-color-dot');
    colorDot.style.background=n.color;
    const label = document.createElement('div');
    label.classList.add('node-label');
    label.textContent=n.name;
    div.appendChild(colorDot);
    div.appendChild(label);
    div.onclick=()=>selectNode(n);
    nodeTree.appendChild(div);
  });
}

function selectNode(node){
  selectedNode=node;
  refreshNodeTree();
  document.getElementById('prop-name').value=node.name;
  document.getElementById('prop-x').value=node.position.x;
  document.getElementById('prop-y').value=node.position.y;
  document.getElementById('prop-z').value=node.position.z;
  document.getElementById('prop-color').value=node.color;
}

function updateNodeProps(){
  if(!selectedNode) return;
  selectedNode.name=document.getElementById('prop-name').value;
  selectedNode.position.x=parseFloat(document.getElementById('prop-x').value);
  selectedNode.position.y=parseFloat(document.getElementById('prop-y').value);
  selectedNode.position.z=parseFloat(document.getElementById('prop-z').value);
  selectedNode.color=document.getElementById('prop-color').value;
  selectedNode.mesh.position.set(selectedNode.position.x,selectedNode.position.y,selectedNode.position.z);
  selectedNode.mesh.material.color.set(selectedNode.color);
  refreshNodeTree();
}

function updateNodeCount(){
  document.getElementById('node-count').textContent=`Nodes: ${nodes.length}`;
}

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
animate();

document.getElementById('add-node-btn').onclick=()=>addNode();
['prop-name','prop-x','prop-y','prop-z','prop-color'].forEach(id=>{
  document.getElementById(id).addEventListener('input',updateNodeProps);
});

document.getElementById('save-btn').onclick=()=>{
  const data={
    title:levelNameInput.value||'Untitled Level',
    description:levelDescInput.value||'No description',
    creator:'grabvrsuite-editor',
    nodes:nodes.map(n=>({
      name:n.name,
      position:n.position,
      color:n.color
    }))
  };
  console.log(JSON.stringify(data,null,2));
  alert('Level JSON saved to console!');
}

window.addEventListener('resize',()=>{
  camera.aspect=canvas.clientWidth/canvas.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(canvas.clientWidth,canvas.clientHeight);
});
</script>
</body>
</html>
