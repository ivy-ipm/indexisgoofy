<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrabVR JSON Editor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
body{margin:0;font-family:'Poppins',sans-serif;background:#f5f5f5;color:#000;}
header{position:sticky;top:0;background:#fff;display:flex;align-items:center;padding:10px 20px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
header h1{margin:0;font-weight:600;}
nav button{margin:0 5px;background:transparent;border:2px solid #5fa9f3;border-radius:5px;color:#000;padding:5px 10px;cursor:pointer;transition:all 0.3s;}
nav button:hover{background:#5fa9f3;color:#fff;}
#editor{margin:20px auto;max-width:800px;display:flex;flex-direction:column;}
textarea{width:100%;height:400px;border:2px solid #5fa9f3;border-radius:5px;padding:10px;font-family:'Poppins',sans-serif;font-size:14px;}
#editor button{margin-top:10px;padding:5px 10px;border:2px solid #5fa9f3;background:transparent;border-radius:5px;cursor:pointer;transition:all 0.3s;}
#editor button:hover{background:#5fa9f3;color:#fff;}
</style>
</head>
<body>
<header>
<h1>GrabVR JSON Editor</h1>
<nav>
<button onclick="window.location.href='/src/index.html'">Back</button>
<button id="import-btn">Import</button>
<button id="export-btn">Export</button>
</nav>
</header>

<div id="editor">
<textarea id="json-editor" placeholder="Paste or edit your Grab JSON here..."></textarea>
<button id="place-block">Place Block</button>
<button id="place-shape">Place Shape</button>
</div>

<script>
const textarea=document.getElementById('json-editor');
document.getElementById('import-btn').onclick=()=>{
const input=document.createElement('input');input.type='file';input.accept='.json,.level';
input.onchange=e=>{const file=e.target.files[0];const reader=new FileReader();reader.onload=ev=>{textarea.value=ev.target.result;};reader.readAsText(file);};
input.click();
};
document.getElementById('export-btn').onclick=()=>{
const blob=new Blob([textarea.value],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='level.level';a.click();URL.revokeObjectURL(url);
};
document.getElementById('place-block').onclick=()=>{alert('Place Block functionality (not fully implemented)');};
document.getElementById('place-shape').onclick=()=>{alert('Place Shape functionality (not fully implemented)');};
</script>
</body>
</html>
