<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAB JSON Level Editor</title>
<style>
:root {
  --bg: #0a0a0d;
  --surf: #13131a;
  --surf2: #1c1c26;
  --surf3: #242432;
  --accent: #00e5a0;
  --accent2: #00b87a;
  --muted: #3a3a50;
  --fg: #e8e8f0;
  --red: #ff4060;
  --yellow: #ffd166;
  --blue: #4da6ff;
  --border: #2a2a3a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--fg);font-family:"Courier New",monospace;font-size:12px;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* TOP BAR */
#topbar{background:var(--surf);border-bottom:2px solid var(--accent);padding:6px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:100;}
#topbar .logo{font-size:14px;font-weight:bold;color:var(--accent);letter-spacing:1px;}
#topbar .logo span{color:var(--fg);}
.tb-btn{background:var(--surf2);color:var(--fg);border:1px solid var(--border);font-family:"Courier New",monospace;font-size:11px;padding:4px 10px;cursor:pointer;white-space:nowrap;border-radius:4px;}
.tb-btn:hover{background:var(--surf3);border-color:var(--accent);}
.tb-btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:bold;}
.tb-btn.primary:hover{background:var(--accent2);}
.tb-btn.danger{color:var(--red);border-color:var(--red);}
.tb-btn.danger:hover{background:#ff406020;}
.tb-sep{width:1px;height:20px;background:var(--border);margin:0 4px;}
#topbar input[type=text]{background:var(--surf2);border:1px solid var(--border);color:var(--fg);font-family:"Courier New",monospace;font-size:11px;padding:4px 8px;width:140px;outline:none;border-radius:3px;}
#topbar input[type=text]:focus{border-color:var(--accent);}
#level-title-input{width:180px;}
.tb-spacer{flex:1;}
#status-bar{font-size:10px;color:var(--muted);white-space:nowrap;}

/* MAIN LAYOUT */
#main{display:flex;flex:1;overflow:hidden;}

/* LEFT PANEL - node tree */
#panel-left{width:180px;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
#panel-left .panel-header{padding:6px 10px;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;}
#node-tree{flex:1;overflow-y:auto;overflow-x:hidden;}
.node-item{padding:4px 6px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;align-items:center;gap:4px;user-select:none;}
.node-item:hover{background:var(--surf2);}
.node-item.selected{background:var(--surf3);border-left:2px solid var(--accent);}
.node-item.group{padding-left:6px;}
.node-indent{display:inline-block;width:12px;flex-shrink:0;}
.node-icon{font-size:10px;flex-shrink:0;}
.node-label{font-size:11px;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.node-color-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.node-expand{font-size:9px;color:var(--muted);cursor:pointer;padding:2px 4px;flex-shrink:0;}
.node-expand:hover{color:var(--accent);}
.node-children{display:none;}
.node-children.open{display:block;}

/* CENTER - 3D VIEW */
#panel-center{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden;}
#canvas{display:block;width:100%;height:100%;}
#view-overlay{position:absolute;top:6px;right:6px;display:flex;flex-direction:column;gap:4px;pointer-events:none;}
.view-badge{background:rgba(13,13,15,0.8);border:1px solid var(--border);padding:2px 6px;font-size:9px;color:var(--muted);letter-spacing:1px;border-radius:3px;}
#view-controls{position:absolute;bottom:6px;right:6px;display:flex;gap:4px;}
.view-btn{background:rgba(19,19,26,0.9);color:var(--muted);border:1px solid var(--border);font-family:"Courier New",monospace;font-size:10px;padding:3px 6px;cursor:pointer;border-radius:3px;}
.view-btn:hover{color:var(--accent);border-color:var(--accent);}
#cam-info{position:absolute;bottom:6px;left:6px;font-size:9px;color:var(--muted);pointer-events:none;}
#node-count{position:absolute;top:6px;left:6px;font-size:9px;color:var(--muted);pointer-events:none;}

/* RIGHT PANEL - properties */
#panel-right{width:220px;background:var(--surf);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
#panel-right .panel-header{padding:6px 10px;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
#props-panel{flex:1;overflow-y:auto;padding:6px;}
.prop-section{margin-bottom:10px;}
.prop-section-title{font-size:9px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;padding-bottom:2px;border-bottom:1px solid var(--border);}
.prop-row{display:flex;align-items:center;margin-bottom:4px;gap:4px;}
.prop-label{font-size:10px;color:var(--muted);width:60px;flex-shrink:0;}
.prop-input{flex:1;background:var(--surf2);border:1px solid var(--border);color:var(--fg);font-family:"Courier New",monospace;font-size:11px;padding:2px 4px;outline:none;width:100%;border-radius:3px;}
.prop-input:focus{border-color:var(--accent);}
.prop-color{width:30px;height:22px;border:1px solid var(--border);cursor:pointer;padding:0;background:none;border-radius:3px;}
.prop-select{flex:1;background:var(--surf2);border:1px solid var(--border);color:var(--fg);font-family:"Courier New",monospace;font-size:11px;padding:2px 4px;outline:none;border-radius:3px;}
.prop-checkbox{accent-color:var(--accent);}
.prop-vec3{display:flex;gap:3px;flex:1;}
.prop-vec3 input{flex:1;min-width:0;}
.prop-xyz{font-size:9px;color:var(--muted);width:10px;flex-shrink:0;}
.no-selection{padding:12px;color:var(--muted);font-size:11px;line-height:1.6;}

/* BOTTOM - JSON editor */
#panel-bottom{height:180px;background:var(--surf);border-top:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
#panel-bottom .panel-header{padding:4px 10px;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:6px;flex-shrink:0;}
#json-editor{flex:1;background:var(--bg);color:#6be5b0;font-family:"Courier New",monospace;font-size:11px;padding:6px 10px;border:none;outline:none;resize:none;line-height:1.5;overflow-y:auto;}
#json-error{padding:4px 10px;font-size:10px;color:var(--red);background:#ff406010;display:none;}

/* SCROLLBARS */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--surf);}
::-webkit-scrollbar-thumb{background:var(--muted);}

/* ADD NODE DROPDOWN */
#add-menu{position:absolute;background:var(--surf);border:1px solid var(--accent);z-index:200;min-width:140px;display:none;border-radius:4px;}
#add-menu.open{display:block;}
.add-item{padding:4px 8px;cursor:pointer;font-size:11px;color:var(--fg);}
.add-item:hover{background:var(--surf2);color:var(--accent);}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span class="logo">&#9672; GRAB <span>Editor</span></span>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="newLevel()">New</button>
  <button class="tb-btn" onclick="document.getElementById('file-input').click()">Open</button>
  <input type="file" id="file-input" accept=".json" style="display:none" onchange="openFile(event)">
  <button class="tb-btn primary" onclick="saveFile()">Save</button>
  <button class="tb-btn" onclick="exportJSON()">Export JSON</button>
  <div class="tb-sep"></div>
  <input type="text" id="level-title-input" placeholder="Level title..." oninput="level.title=this.value;markDirty()">
  <input type="text" id="level-creators-input" placeholder="Creators..." oninput="level.creators=this.value;markDirty()">
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="toggleAddMenu()">+ Add Node &#9660;</button>
  <div id="add-menu">
    <div class="add-item" onclick="addNode('static','CUBE')">Static Cube</div>
    <div class="add-item" onclick="addNode('static','SPHERE')">Static Sphere</div>
    <div class="add-item" onclick="addNode('group')">Group</div>
    <div class="add-item" onclick="addNode('start')">Start Point</div>
    <div class="add-item" onclick="addNode('finish')">Finish Point</div>
  </div>
  <button class="tb-btn danger" onclick="deleteSelected()">Delete</button>
  <div class="tb-spacer"></div>
  <span id="status-bar">Ready</span>
</div>

<!-- MAIN -->
<div id="main">
  <div id="panel-left">
    <div class="panel-header">NODES <span id="tree-count">0</span></div>
    <div id="node-tree"></div>
  </div>

  <div id="panel-center">
    <canvas id="canvas"></canvas>
    <div id="view-overlay"><div class="view-badge">3D View</div></div>
    <div id="view-controls">
      <button class="view-btn" onclick="setCamPreset('top')">TOP</button>
      <button class="view-btn" onclick="setCamPreset('front')">FRONT</button>
      <button class="view-btn" onclick="setCamPreset('side')">SIDE</button>
      <button class="view-btn" onclick="resetCamera()">RESET</button>
    </div>
  </div>

  <div id="panel-right">
    <div class="panel-header">PROPERTIES</div>
    <div id="props-panel"><div class="no-selection">Select a node to edit its properties.</div></div>
  </div>
</div>

<div id="panel-bottom">
  <div class="panel-header">
    JSON EDITOR
    <button class="tb-btn" onclick="applyJSON()" style="font-size:10px;padding:2px 6px;">Apply</button>
    <button class="tb-btn" onclick="formatJSON()" style="font-size:10px;padding:2px 6px;">Format</button>
    <button class="tb-btn" onclick="copyJSON()" style="font-size:10px;padding:2px 6px;">Copy</button>
  </div>
  <div id="json-error"></div>
  <textarea id="json-editor"></textarea>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>
<script>
let level={title:'New Level',creators:'',levelNodes:[]};
let selectedNode=null;
let selectedPath=null;
let dirty=false;
let nodeIdCounter=0;

function markDirty(){dirty=true;setStatus('Unsaved changes');}
function setStatus(s){document.getElementById('status-bar').textContent=s;}

// 3D Setup
let scene=new THREE.Scene();
scene.background=new THREE.Color(0x445566);
let camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(10,10,10);
let renderer=new THREE.WebGLRenderer({canvas:document.getElementById('canvas'),antialias:true});
renderer.setSize(window.innerWidth-400, window.innerHeight-180);
window.addEventListener('resize',()=>{renderer.setSize(window.innerWidth-400,window.innerHeight-180);camera.aspect=(window.innerWidth-400)/(window.innerHeight-180);camera.updateProjectionMatrix();});

let controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

// Lighting
let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,10,10);
scene.add(light);
scene.add(new THREE.AmbientLight(0x888888));

// Skybox
let skyGeo=new THREE.BoxGeometry(500,500,500);
let skyMat=new THREE.MeshBasicMaterial({color:0x223344,side:THREE.BackSide});
scene.add(new THREE.Mesh(skyGeo,skyMat));

let meshes={};

function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);}
animate();

function addNode(type,shape='CUBE'){
  let node={id:nodeIdCounter++,type:type,shape:shape,position:{x:0,y:0,z:0}};
  if(type==='group')node.children=[];
  level.levelNodes.push(node);
  selectedNode=node;selectedPath=[level.levelNodes.length-1];
  renderTree();renderProps();
  spawnMesh(node);
  markDirty();
}

function spawnMesh(node){
  let geo;
  switch(node.shape){
    case'CUBE':geo=new THREE.BoxGeometry(1,1,1);break;
    case'SPHERE':geo=new THREE.SphereGeometry(0.5,16,16);break;
    default:geo=new THREE.BoxGeometry(1,1,1);
  }
  let mat=new THREE.MeshStandardMaterial({color:0x00e5a0});
  let mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(node.position.x,node.position.y,node.position.z);
  scene.add(mesh);
  meshes[node.id]=mesh;
}

// NODE TREE
function renderTree(){
  const tree=document.getElementById('node-tree');
  let html='';
  level.levelNodes.forEach((node,i)=>{html+=`<div class="node-item${selectedNode===node?' selected':''}" onclick="selectNode(${i})">${node.type} ${node.shape}</div>`;});
  tree.innerHTML=html||'<div style="padding:8px;color:var(--muted)">No nodes</div>';
  document.getElementById('tree-count').textContent=level.levelNodes.length;
}

function selectNode(i){selectedNode=level.levelNodes[i];selectedPath=[i];renderTree();renderProps();}

function renderProps(){
  const panel=document.getElementById('props-panel');
  if(!selectedNode){panel.innerHTML='<div class="no-selection">Select a node to edit its properties.</div>';return;}
  panel.innerHTML=`<div class="prop-row"><span class="prop-label">X:</span><input class="prop-input" type="number" value="${selectedNode.position.x}" onchange="updatePos('x',this.value)"></div>
                   <div class="prop-row"><span class="prop-label">Y:</span><input class="prop-input" type="number" value="${selectedNode.position.y}" onchange="updatePos('y',this.value)"></div>
                   <div class="prop-row"><span class="prop-label">Z:</span><input class="prop-input" type="number" value="${selectedNode.position.z}" onchange="updatePos('z',this.value)"></div>`;
}

function updatePos(axis,val){
  selectedNode.position[axis]=parseFloat(val);
  let mesh=meshes[selectedNode.id];
  if(mesh)mesh.position[axis]=parseFloat(val);
}

function deleteSelected(){
  if(!selectedNode)return;
  let idx=level.levelNodes.indexOf(selectedNode);
  if(idx!==-1){level.levelNodes.splice(idx,1);scene.remove(meshes[selectedNode.id]);delete meshes[selectedNode.id];selectedNode=null;selectedPath=null;renderTree();renderProps();}
}

function toggleAddMenu(){document.getElementById('add-menu').classList.toggle('open');}

// JSON
function exportJSON(){document.getElementById('json-editor').value=JSON.stringify(level,null,2);}
function applyJSON(){try{level=JSON.parse(document.getElementById('json-editor').value);renderTree();setStatus('JSON applied');}catch(e){document.getElementById('json-error').style.display='block';document.getElementById('json-error').textContent=e.message;}}
function formatJSON(){try{document.getElementById('json-editor').value=JSON.stringify(JSON.parse(document.getElementById('json-editor').value),null,2);}catch{}}
function copyJSON(){navigator.clipboard.writeText(document.getElementById('json-editor').value);setStatus('JSON copied');}
function newLevel(){level={title:'New Level',creators:'',levelNodes:[]};selectedNode=null;selectedPath=null;meshes={};renderTree();renderProps();exportJSON();setStatus('New level');}
function saveFile(){const blob=new Blob([JSON.stringify(level,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(level.title||'level')+'.json';a.click();}
function openFile(evt){const file=evt.target.files[0];const reader=new FileReader();reader.onload=e=>{level=JSON.parse(e.target.result);renderTree();renderProps();exportJSON();setStatus('File loaded');};reader.readAsText(file);}
function setCamPreset(p){
  switch(p){
    case'top':camera.position.set(0,15,0);camera.up.set(0,0,-1);break;
    case'front':camera.position.set(0,5,15);camera.up.set(0,1,0);break;
    case'side':camera.position.set(15,5,0);camera.up.set(0,1,0);break;
  }
  controls.target.set(0,0,0);controls.update();
}
function resetCamera(){camera.position.set(10,10,10);camera.up.set(0,1,0);controls.target.set(0,0,0);controls.update();}
</script>

</body>
</html>
