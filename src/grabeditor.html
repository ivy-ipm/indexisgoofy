<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrabVR JSON Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;background:linear-gradient(160deg,#a0d8f1,#bfe6fb,#a0d8f1)}
header{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:rgba(255,255,255,0.5);backdrop-filter:blur(10px)}
header .logo{font-weight:600;font-size:1.3rem}
#mainContainer{display:flex;flex:1;overflow:hidden}
#palette{width:150px;background:rgba(255,255,255,0.2);backdrop-filter:blur(5px);padding:10px;overflow-y:auto;display:flex;flex-direction:column}
#palette button{margin:5px 0;padding:8px;border:none;border-radius:6px;background:rgba(255,255,255,0.3);cursor:pointer;transition:0.2s}
#palette button:hover{background:rgba(95,169,243,0.5);color:#fff}
#editorContainer{flex:1;display:flex;flex-direction:column;position:relative}
#viewer{flex:1;width:100%;height:100%;display:block}
#jsonPanel{height:200px;background:rgba(255,255,255,0.6);backdrop-filter:blur(5px);overflow:auto;padding:10px;font-family:monospace;resize:none;width:100%;border:none}
#editorControls{display:flex;justify-content:flex-start;padding:5px;background:rgba(255,255,255,0.5);backdrop-filter:blur(5px)}
#editorControls button{margin-right:5px;padding:6px 12px;border:none;border-radius:6px;background:rgba(95,169,243,0.7);color:#fff;cursor:pointer;transition:0.3s}
#editorControls button:hover{background:#5fa9f3}
</style>
</head>
<body>
<header>
<div class="logo">GrabVR JSON Editor</div>
</header>
<div id="mainContainer">
<div id="palette"></div>
<div id="editorContainer">
<canvas id="viewer"></canvas>
<div id="editorControls">
<button id="saveBtn">Save JSON</button>
<button id="loadBtn">Load JSON</button>
<button id="resetBtn">Reset</button>
</div>
<textarea id="jsonPanel" placeholder="Raw JSON appears here"></textarea>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/TransformControls.js"></script>
<script>
const canvas=document.getElementById("viewer");
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,canvas.clientWidth/canvas.clientHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true});
renderer.setSize(canvas.clientWidth,canvas.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);

// Skybox for daytime: light blue top/bottom, white middle
const skyGeometry=new THREE.BoxGeometry(1000,1000,1000);
const skyMaterials=[
new THREE.MeshBasicMaterial({color:0xa0d8f1,side:THREE.BackSide}), // right
new THREE.MeshBasicMaterial({color:0xa0d8f1,side:THREE.BackSide}), // left
new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.BackSide}), // top
new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.BackSide}), // bottom
new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.BackSide}), // front
new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.BackSide})  // back
];
const skybox=new THREE.Mesh(skyGeometry,skyMaterials);
scene.add(skybox);

// Camera and controls
camera.position.set(5,5,5);
const orbitControls=new THREE.OrbitControls(camera,renderer.domElement);
orbitControls.update();

// Block palette
const palette=document.getElementById("palette");
const blocks=["Red","Green","Blue","Yellow","Gray"];
let selectedBlock=null;
blocks.forEach(color=>{
const btn=document.createElement("button");
btn.textContent=color;
btn.onclick=()=>selectedBlock=color;
palette.appendChild(btn);
});

// Transform controls
const transformControls=new THREE.TransformControls(camera,renderer.domElement);
scene.add(transformControls);

const blockObjects=[];
function addBlock(color,pos){const geom=new THREE.BoxGeometry();const mat=new THREE.MeshStandardMaterial({color:color.toLowerCase()});const cube=new THREE.Mesh(geom,mat);cube.position.copy(pos);scene.add(cube);blockObjects.push(cube);return cube;}

// Lights
const ambient=new THREE.AmbientLight(0xffffff,0.6);scene.add(ambient);
const dirLight=new THREE.DirectionalLight(0xffffff,0.8);dirLight.position.set(5,10,7);scene.add(dirLight);

// Mouse interaction
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let selectedObj=null;
canvas.addEventListener("pointerdown",e=>{
mouse.x=(e.offsetX/canvas.clientWidth)*2-1;
mouse.y=-(e.offsetY/canvas.clientHeight)*2+1;
raycaster.setFromCamera(mouse,camera);
const intersects=raycaster.intersectObjects(blockObjects);
if(intersects.length>0){selectedObj=intersects[0].object;transformControls.attach(selectedObj);}
else if(selectedBlock){const cube=addBlock(selectedBlock,new THREE.Vector3(0,0,0));transformControls.attach(cube);}
});

// Responsive
window.addEventListener("resize",()=>{camera.aspect=canvas.clientWidth/canvas.clientHeight;camera.updateProjectionMatrix();renderer.setSize(canvas.clientWidth,canvas.clientHeight);});

// JSON panel sync
const jsonPanel=document.getElementById("jsonPanel");
function updateJSON(){const arr=blockObjects.map(b=>({color:b.material.color.getStyle(),position:b.position.toArray(),scale:b.scale.toArray()}));jsonPanel.value=JSON.stringify(arr,null,2);}
const saveBtn=document.getElementById("saveBtn");
const loadBtn=document.getElementById("loadBtn");
const resetBtn=document.getElementById("resetBtn");

saveBtn.onclick=()=>{updateJSON();alert("JSON updated in panel");};
loadBtn.onclick=()=>{try{const data=JSON.parse(jsonPanel.value);blockObjects.forEach(b=>scene.remove(b));blockObjects.length=0;data.forEach(d=>addBlock(d.color,new THREE.Vector3(...d.position)));}catch{alert("Invalid JSON")}};
resetBtn.onclick=()=>{blockObjects.forEach(b=>scene.remove(b));blockObjects.length=0;jsonPanel.value="";};

// Animate
function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);}
animate();
</script>
</body>
</html>
