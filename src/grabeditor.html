<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrabVR JSON Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body, html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:'Poppins',sans-serif;background:linear-gradient(160deg,#a0d8f1,#bfe6fb,#a0d8f1)}
#editorUI{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column}
header{height:50px;background:rgba(255,255,255,0.6);backdrop-filter:blur(10px);display:flex;align-items:center;padding:0 15px;z-index:1000;flex-shrink:0}
header h1{font-size:1.1rem;margin:0}
#mainArea{flex:1;display:flex;overflow:hidden}
#palette{width:200px;background:rgba(255,255,255,0.2);backdrop-filter:blur(5px);padding:10px;overflow-y:auto;flex-shrink:0}
#palette h2{margin-top:0}
#blockPalette{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.blockBtn{width:60px;height:60px;border-radius:6px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:#000;transition:0.2s}
.blockBtn:hover{background:#5fa9f3;color:#fff}
#sceneContainer{flex:1;position:relative}
canvas{display:block}
#jsonPanel{position:absolute;top:10px;right:10px;width:300px;height:400px;background:rgba(255,255,255,0.8);backdrop-filter:blur(5px);padding:10px;border-radius:8px;overflow:auto;z-index:1000;font-size:0.8rem}
#jsonPanel textarea{width:100%;height:calc(100% - 60px);border:none;border-radius:5px;padding:5px;resize:none;font-family:monospace;font-size:0.8rem}
#jsonPanel button{margin-top:5px;padding:5px;border:none;border-radius:6px;background:#5fa9f3;color:#fff;cursor:pointer;width:100%}
@media(max-width:768px){#palette{width:100px}#blockPalette{grid-template-columns:repeat(2,1fr)}#jsonPanel{width:200px;height:300px;font-size:0.7rem}}
</style>
</head>
<body>
<div id="editorUI">
<header><h1>GrabVR JSON Editor</h1></header>
<div id="mainArea">
<div id="palette">
<h2>Palette</h2>
<div id="blockPalette"></div>
</div>
<div id="sceneContainer"></div>
<div id="jsonPanel">
<textarea id="rawJSON"></textarea>
<button id="loadJSONBtn">Load JSON</button>
<button id="exportJSONBtn">Export JSON</button>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/controls/TransformControls.js"></script>
<script>
let scene=new THREE.Scene();
let camera=new THREE.PerspectiveCamera(70,window.innerWidth/window.innerHeight,0.1,1000);
let renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.getElementById("sceneContainer").appendChild(renderer.domElement);

scene.background=new THREE.CubeTextureLoader().setPath('').load([
'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=', 
'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=',
'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=',
'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=',
'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=',
'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII='
]);

let gridHelper=new THREE.GridHelper(100,100);
scene.add(gridHelper);

let light=new THREE.AmbientLight(0xffffff,0.8);
scene.add(light);

let directionalLight=new THREE.DirectionalLight(0xffffff,0.5);
directionalLight.position.set(50,50,50);
scene.add(directionalLight);

camera.position.set(5,5,5);
let orbit=new THREE.OrbitControls(camera,renderer.domElement);
orbit.enableDamping=true;
orbit.dampingFactor=0.05;

let transformControls=new THREE.TransformControls(camera,renderer.domElement);
scene.add(transformControls);

window.addEventListener('resize',()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

let blocks=[];
const blockTypes=["Grass","Stone","Wood","Sand","Water","Glass"];
const blockPaletteDiv=document.getElementById("blockPalette");

blockTypes.forEach(bt=>{
let btn=document.createElement("div");
btn.className="blockBtn";btn.textContent=bt;
btn.onclick=()=>{
let geometry=new THREE.BoxGeometry(1,1,1);
let material=new THREE.MeshStandardMaterial({color:Math.random()*0xffffff});
let mesh=new THREE.Mesh(geometry,material);
mesh.userData.type=bt;
scene.add(mesh);
blocks.push(mesh);
};
blockPaletteDiv.appendChild(btn);
});

renderer.domElement.addEventListener("pointerdown",(e)=>{
let mouse=new THREE.Vector2();
mouse.x=(e.clientX/window.innerWidth)*2-1;
mouse.y=-(e.clientY/window.innerHeight)*2+1;
let raycaster=new THREE.Raycaster();
raycaster.setFromCamera(mouse,camera);
let intersects=raycaster.intersectObjects(blocks);
if(intersects.length>0){transformControls.attach(intersects[0].object);}
});

scene.add(transformControls);

function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);}
animate();

const rawJSON=document.getElementById("rawJSON");
const loadJSONBtn=document.getElementById("loadJSONBtn");
const exportJSONBtn=document.getElementById("exportJSONBtn");

exportJSONBtn.onclick=()=>{
let jsonBlocks=blocks.map(b=>({type:b.userData.type,position:b.position,rotation:b.rotation,scale:b.scale}));
rawJSON.value=JSON.stringify(jsonBlocks,null,2);
};

loadJSONBtn.onclick=()=>{
try{
let data=JSON.parse(rawJSON.value);
blocks.forEach(b=>scene.remove(b));
blocks=[];
data.forEach(d=>{
let geo=new THREE.BoxGeometry(1,1,1);
let mat=new THREE.MeshStandardMaterial({color:Math.random()*0xffffff});
let mesh=new THREE.Mesh(geo,mat);
mesh.position.copy(d.position);
mesh.rotation.copy(d.rotation);
mesh.scale.copy(d.scale);
mesh.userData.type=d.type;
scene.add(mesh);
blocks.push(mesh);
});
}catch{alert("Invalid JSON");}
};
</script>
</body>
</html>
