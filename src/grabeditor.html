<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrabEditor</title>
<style>
body, html{margin:0;padding:0;font-family:sans-serif;background:#1c1c1c;color:#eee;height:100%;display:flex;flex-direction:column;}
#top-bar{display:flex;align-items:center;background:#2a2a2a;padding:5px 8px;gap:5px;flex-wrap:wrap;}
button{background:#3a3a3a;color:#eee;border:none;padding:5px 10px;font-size:14px;cursor:pointer;border-radius:3px;}
button:hover{background:#505050;}
#container{flex:1;display:flex;overflow:hidden;}
#tree-panel{width:200px;background:#252525;overflow:auto;padding:5px;font-size:14px;}
#props-panel{width:200px;background:#252525;overflow:auto;padding:5px;font-size:14px;}
#editor-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
#canvas3d{width:100%;height:50%;background:#000;margin-bottom:5px;border-radius:3px;}
textarea{width:100%;height:calc(50% - 10px);background:#111;color:#eee;border:1px solid #333;padding:5px;resize:none;border-radius:3px;font-family:monospace;font-size:12px;}
.node-item{padding:2px 5px;margin:2px 0;border-radius:3px;cursor:pointer;}
.node-item.selected{background:#3a3a3a;}
.prop-section{margin-bottom:8px;}
.prop-section-title{font-weight:bold;margin-bottom:3px;font-size:13px;}
.prop-row{display:flex;justify-content:space-between;margin-bottom:2px;}
.prop-input{width:60px;font-size:12px;padding:2px;border-radius:2px;border:1px solid #333;background:#111;color:#eee;}
.wide{width:100%;}
#add-menu{position:absolute;top:35px;left:5px;background:#2a2a2a;padding:5px;display:none;flex-direction:column;gap:3px;border-radius:3px;z-index:10;}
#add-menu.open{display:flex;}
@media(max-width:600px){
  #tree-panel,#props-panel{width:120px;font-size:12px;}
  button{font-size:12px;padding:3px 6px;}
  #canvas3d{height:40%;}
  textarea{height:calc(60% - 10px);}
}
</style>
</head>
<body>
<div id="top-bar">
<button id="btn-add">Add Node</button>
<button id="btn-delete">Delete Node</button>
<button id="btn-copy-json">Copy Level JSON</button>
<button id="btn-apply-json">Apply Level JSON</button>
<div id="add-menu">
<button onclick="addNode('static','cube')">Static Cube</button>
<button onclick="addNode('static','sphere')">Static Sphere</button>
</div>
</div>
<div id="container">
<div id="tree-panel"></div>
<div id="editor-panel">
<canvas id="canvas3d"></canvas>
<textarea id="json-output" readonly></textarea>
</div>
<div id="props-panel"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>
<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(3,3,5);
let renderer = new THREE.WebGLRenderer({canvas: document.getElementById('canvas3d'), antialias:true});
renderer.setSize(document.getElementById('canvas3d').clientWidth, document.getElementById('canvas3d').clientHeight);
let controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

let ambient = new THREE.AmbientLight(0x404040);
scene.add(ambient);

let nodes = [];
let selectedNode = null;

function animate(){
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', ()=>{
    renderer.setSize(document.getElementById('canvas3d').clientWidth, document.getElementById('canvas3d').clientHeight);
    camera.aspect = document.getElementById('canvas3d').clientWidth / document.getElementById('canvas3d').clientHeight;
    camera.updateProjectionMatrix();
});

function createMesh(type){
    let geom, mat = new THREE.MeshStandardMaterial({color:Math.random()*0xffffff});
    if(type==='cube') geom = new THREE.BoxGeometry(1,1,1);
    else if(type==='sphere') geom = new THREE.SphereGeometry(0.5,32,32);
    return new THREE.Mesh(geom, mat);
}

function updateTree(){
    let treePanel = document.getElementById('tree-panel');
    treePanel.innerHTML = '';
    nodes.forEach((n,i)=>{
        let div = document.createElement('div');
        div.className = 'node-item'+(n===selectedNode?' selected':'');
        div.textContent = n.name;
        div.onclick = ()=>{ selectedNode=n; updateTree(); }
        treePanel.appendChild(div);
    });
    updateJSON();
}

function updateJSON(){
    let out = {levelData:{objects:nodes.map(n=>({id:n.id,type:n.type,position:n.mesh.position.toArray(),color:n.mesh.material.color.getHexString()}))}};
    document.getElementById('json-output').value = JSON.stringify(out,null,2);
}

function addNode(type,meshType){
    let mesh = createMesh(meshType);
    mesh.position.set(Math.random()*2-1,0.5,Math.random()*2-1);
    scene.add(mesh);
    let node = {id:'node'+(nodes.length+1),name:'Node '+(nodes.length+1),type:type,mesh:mesh};
    nodes.push(node);
    selectedNode = node;
    updateTree();
}

document.getElementById('btn-add').onclick = ()=>{
    document.getElementById('add-menu').classList.toggle('open');
}

document.getElementById('btn-delete').onclick = ()=>{
    if(!selectedNode) return;
    scene.remove(selectedNode.mesh);
    nodes = nodes.filter(n=>n!==selectedNode);
    selectedNode = null;
    updateTree();
}

document.getElementById('btn-copy-json').onclick = ()=>{
    navigator.clipboard.writeText(document.getElementById('json-output').value);
}

document.getElementById('btn-apply-json').onclick = ()=>{
    let val = prompt('Paste Level JSON here:');
    if(!val) return;
    try{
        let data = JSON.parse(val).levelData.objects;
        nodes.forEach(n=>scene.remove(n.mesh));
        nodes = [];
        data.forEach(d=>{
            let mesh = createMesh(d.type==='static'?'cube':'cube');
            if(d.position) mesh.position.fromArray(d.position);
            if(d.color) mesh.material.color.set('#'+d.color);
            scene.add(mesh);
            nodes.push({id:d.id,name:d.id,type:d.type,mesh:mesh});
        });
        selectedNode = null;
        updateTree();
    }catch(e){alert('Invalid JSON');}
}

document.getElementById('btn-format-json').onclick = ()=>{
    let val = document.getElementById('json-output').value;
    try{
        let parsed = JSON.parse(val);
        document.getElementById('json-output').value = JSON.stringify(parsed,null,2);
    }catch(e){}
}
</script>
</body>
</html>
