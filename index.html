<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrabVR Terminal</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff88;
  font-family: monospace;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 600px;
  max-width: 95%;
}

.output {
  background: #000;
  border: 1px solid #00ff88;
  padding: 15px;
  height: 300px;
  overflow-y: auto;
  margin-bottom: 10px;
  white-space: pre-wrap;
}

.input {
  display: flex;
}

input {
  flex: 1;
  background: black;
  border: 1px solid #00ff88;
  color: #00ff88;
  padding: 10px;
  outline: none;
}

button {
  background: #00ff88;
  color: black;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
}

img {
  margin-top: 10px;
  max-width: 100%;
  border: 1px solid #00ff88;
}

.footer {
  margin-top: 15px;
  text-align: center;
  font-size: 12px;
  color: #00ff88;
}

.footer a {
  color: #00ff88;
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">
  <div class="output" id="output"></div>

  <div class="input">
    <input id="linkInput" placeholder="Enter Grab level link...">
    <button onclick="run()">EXEC</button>
  </div>

  <div class="footer">
    made by ivy • by love from poizonTools team • 
    <a href="https://discord.gg/G6aNgvM7j9" target="_blank">discord.gg/G6aNgvM7j9</a>
    <br>© 2026
  </div>
</div>

<script>
function log(msg) {
  const output = document.getElementById('output');
  const time = new Date().toLocaleTimeString();
  output.innerHTML += `[${time}] ${msg}\n`;
  output.scrollTop = output.scrollHeight;
}

function extractIDs(link) {
  try {
    const url = new URL(link);
    const levelParam = url.searchParams.get('level');
    if (!levelParam) return null;
    const parts = levelParam.split(':');
    if (parts.length < 2) return null;
    return { userID: parts[0], timestamp: parts[1] };
  } catch {
    return null;
  }
}

const encodedAPI = "aHR0cHM6Ly9hcGkuc2xpbi5kZXYvZ3JhYi92MQ==";
function getAPI() {
  return atob(encodedAPI);
}

async function run() {
  const input = document.getElementById('linkInput').value.trim();

  if (!input) {
    log("No input provided");
    return;
  }

  log("Parsing input...");
  const ids = extractIDs(input);

  if (!ids) {
    log("Failed to extract level ID");
    return;
  }

  const { userID, timestamp } = ids;
  log(`User ID: ${userID}`);
  log(`Level Timestamp: ${timestamp}`);

  log("Fetching Private API..");

  try {
    const apiBase = getAPI();

    const infoURL = `${apiBase}/level/${userID}:${timestamp}`;
    const downloadURL = `${apiBase}/download/${userID}/${timestamp}`;

    const res = await fetch(infoURL);
    if (!res.ok) throw new Error();

    const data = await res.json();

    const name = data.name || "unknown_level";
    const image = data.image || "";

    log(`Level Name: ${name}`);
    log("Preparing download...");

    if (image) {
      const img = document.createElement("img");
      img.src = image;
      document.getElementById('output').appendChild(img);
    }

    const a = document.createElement('a');
    a.href = downloadURL;
    a.download = `${name.replace(/\s/g,'_')}-${timestamp}.level`;
    a.click();

    log("Download started");
  } catch {
    log("Failed to fetch level");
  }
}
</script>

</body>
</html>
