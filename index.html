<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrabVR Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Inter',sans-serif;transition:0.3s;background:#f4f7fa;color:#1e1e2f}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#00aaff,#00ffaa);color:white;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
header div{font-weight:700;font-size:24px}
nav{display:flex;align-items:center;gap:8px}
nav button{cursor:pointer;padding:8px 14px;border:none;border-radius:6px;background:rgba(255,255,255,0.2);color:white;font-weight:600;transition:0.2s}
nav button:hover{background:rgba(255,255,255,0.4)}
#container{max-width:1000px;margin:30px auto;padding:0 20px}
section{display:none;margin-top:20px}
section.active{display:block}
#toolBox{border:1px solid #ccc;border-radius:10px;padding:20px;min-height:300px;margin-top:20px;background:linear-gradient(180deg,#ffffff,#e0f7ff)}
input{width:100%;padding:10px;margin-bottom:10px;border-radius:6px;border:1px solid #ccc;font-size:14px}
button.action{padding:10px 15px;cursor:pointer;border-radius:6px;border:none;background:#00aaff;color:white;font-weight:600;transition:0.2s}
button.action:hover{background:#0077aa}
canvas{width:100%;height:400px;background:#000;border-radius:10px;margin-top:15px}
#loginBox{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;display:none;flex-direction:column;border:1px solid #ccc;border-radius:10px;z-index:200;min-width:280px;box-shadow:0 5px 15px rgba(0,0,0,0.3)}
#loginBox input{margin-bottom:10px}
#loginBox button{margin-top:5px}
#themeToggle{position:fixed;bottom:15px;right:15px;z-index:300}
footer{text-align:center;margin-top:30px;font-size:12px;color:#00aaff}
#jsStatus{margin-top:10px;font-weight:600}
</style>
</head>
<body>
<header>
<div>GrabVR Suite</div>
<nav>
<button id="nav_homepage">Homepage</button>
<button id="nav_tools">Tools</button>
<button id="nav_games">Games</button>
<button id="nav_login">User Login</button>
<button id="themeToggle">🌙</button>
</nav>
</header>
<div id="container"></div>
<div id="loginBox">
<h3>User Login</h3>
<input id="loginUsername" placeholder="Enter Username">
<input id="loginUserID" placeholder="User ID" readonly>
<button id="guessBtn">Guess</button>
<button id="loginBtn" style="display:none">Login</button>
<button id="closeLogin">Close</button>
</div>
<footer>made by ivy • by love from poizonTools team • <a href="https://discord.gg/G6aNgvM7j9" target="_blank">discord.gg/G6aNgvM7j9</a><br>© 2026</footer>
<script>
(() => {
let theme='day';const container=document.getElementById('container');const sections={};
function toggleTheme(){if(theme==='day'){document.body.style.background='#1e1e2f';document.body.style.color='#f4f7fa';theme='night';document.getElementById('themeToggle').textContent='☀️';}else{document.body.style.background='#f4f7fa';document.body.style.color='#1e1e2f';theme='day';document.getElementById('themeToggle').textContent='🌙';}}
function showSection(id){Object.values(sections).forEach(s=>s.classList.remove('active'));if(sections[id])sections[id].classList.add('active');}
document.getElementById('themeToggle').onclick=toggleTheme;
document.getElementById('nav_homepage').onclick=()=>showSection('homepage');
document.getElementById('nav_tools').onclick=()=>showSection('tools');
document.getElementById('nav_games').onclick=()=>showSection('games');
document.getElementById('nav_login').onclick=()=>document.getElementById('loginBox').style.display='flex';

const home=document.createElement('section');home.id='homepage';home.classList.add('active');home.innerHTML=`
<h2>Welcome to GrabVR Suite</h2>
<p>Created by <strong>Pakiv Team</strong> (Pakker + Ivy). Explore tools, download levels, convert models, generate 3D maps, play GRABcraft, and more. This all-in-one platform allows Grab VR enthusiasts to manage their levels, analyze complexity, convert images, and enjoy mini-games—all from one intuitive interface.</p>
<div id="jsStatus">JS running ✅</div>
`;container.appendChild(home);sections['homepage']=home;

const tools=document.createElement('section');tools.id='tools';
const toolButtons=document.createElement('div');toolButtons.style.display='flex';toolButtons.style.flexWrap='wrap';toolButtons.style.gap='10px';
const toolBox=document.createElement('div');toolBox.id='toolBox';toolBox.textContent='Select a tool above to start.';

['Level Downloader','Player Lookup','Level Complexity Analyzer','Pixel-Art Level','OBJ→SGM Converter','Image→3D Map'].forEach(tool=>{
const btn=document.createElement('button');btn.textContent=tool;btn.style.flex='1 1 180px';btn.style.padding='15px';btn.onclick=()=>showTool(tool);toolButtons.appendChild(btn);
});

tools.appendChild(toolButtons);tools.appendChild(toolBox);container.appendChild(tools);sections['tools']=tools;

function showTool(tool){toolBox.innerHTML='';switch(tool){
case 'Level Downloader':
toolBox.innerHTML=`<h3>Level Downloader</h3>
<input id="levelLink" placeholder="Enter Grab level link">
<input id="levelName" placeholder="Optional: File Name">
<button class="action" id="downloadBtn">Download</button>
<div id="downloadOutput"></div>`;
document.getElementById('downloadBtn').onclick=downloadLevel;
break;
case 'Player Lookup':
toolBox.innerHTML=`<h3>Player Lookup</h3>
<input id="lookupUser" placeholder="Enter Player Username">
<button class="action" id="lookupBtn">Lookup</button>
<div id="lookupOutput"></div>`;
document.getElementById('lookupBtn').onclick=lookupPlayer;
break;
case 'Level Complexity Analyzer':
toolBox.innerHTML=`<h3>Level Complexity Analyzer</h3><p>Complexity: 6/2000 (useless tool)</p>`;
break;
case 'Pixel-Art Level':
toolBox.innerHTML=`<h3>Pixel-Art Level</h3><input type="file" id="pixelImage"><p>Import an image to generate a GrabVR JSON level.</p>
<button class="action" id="pixelBtn">Generate Level</button><div id="pixelOutput"></div>`;
document.getElementById('pixelBtn').onclick=generatePixelLevel;
break;
case 'OBJ→SGM Converter':
toolBox.innerHTML=`<h3>OBJ→SGM Converter</h3><input type="file" id="objFile"><p>Converts OBJ models to SGM level format.</p>
<button class="action" id="objBtn">Convert</button><div id="objOutput"></div>`;
document.getElementById('objBtn').onclick=convertOBJ;
break;
case 'Image→3D Map':
toolBox.innerHTML=`<h3>Image→3D Map</h3><input type="file" id="mapImage"><p>AI analyzes image and generates a 3D GrabVR map.</p>
<button class="action" id="mapBtn">Generate 3D Map</button><div id="mapOutput"></div>`;
document.getElementById('mapBtn').onclick=generate3DMap;
break;
default:toolBox.textContent=tool+' is a placeholder.';}
}

async function downloadLevel(){
const link=document.getElementById('levelLink').value.trim();
const name=document.getElementById('levelName').value.trim()||'grab-level';
const out=document.getElementById('downloadOutput');out.textContent='';
if(!link){out.textContent='Enter level link';return;}
try{
const url=new URL(link);const levelParam=url.searchParams.get('level');const parts=levelParam.split(':');const userID=parts[0],timestamp=parts[1];
const a=document.createElement('a');a.href='https://api.slin.dev/grab/v1/download/'+userID+'/'+timestamp+'/1/'+name+'.level';a.download=name+'.level';a.click();out.textContent='Download started: '+name+'.level';
}catch(e){out.textContent='Failed to download';}
}

async function lookupPlayer(){
const username=document.getElementById('lookupUser').value.trim();const out=document.getElementById('lookupOutput');out.textContent='';if(!username){out.textContent='Enter username';return;}
try{const res=await fetch('https://api.slin.dev/grab/v1/user/'+username);const data=await res.json();out.textContent='User ID: '+data.id+'\nLevels:\n'+(data.levels?.join('\n')||'No levels found');}catch(e){out.textContent='Failed to fetch user';}
}

function generatePixelLevel(){const file=document.getElementById('pixelImage').files[0];const out=document.getElementById('pixelOutput');if(!file){out.textContent='Select an image';return;}out.textContent='Generated JSON Level (placeholder)';}
function convertOBJ(){const file=document.getElementById('objFile').files[0];const out=document.getElementById('objOutput');if(!file){out.textContent='Select OBJ file';return;}out.textContent='Converted SGM (placeholder)';}
function generate3DMap(){const file=document.getElementById('mapImage').files[0];const out=document.getElementById('mapOutput');if(!file){out.textContent='Select image';return;}out.textContent='Generated 3D Map (placeholder)';}

const games=document.createElement('section');games.id='games';
const gameTitle=document.createElement('h2');gameTitle.textContent='GRABcraft';
const gameCanvas=document.createElement('canvas');gameCanvas.style.width='100%';gameCanvas.style.height='400px';gameCanvas.style.background='#000';
const gameDesc=document.createElement('p');gameDesc.textContent='Mini GRABcraft: place/move blocks, survival, progress saved (placeholder).';
games.appendChild(gameTitle);games.appendChild(gameCanvas);games.appendChild(gameDesc);
container.appendChild(games);sections['games']=games;

document.getElementById('closeLogin').onclick=()=>document.getElementById('loginBox').style.display='none';
document.getElementById('guessBtn').onclick=async()=>{
const username=document.getElementById('loginUsername').value.trim();if(!username)return alert('Enter username');
try{const res=await fetch('https://api.slin.dev/grab/v1/user/'+username);const data=await res.json();document.getElementById('loginUserID').value=data.id||'unknown';document.getElementById('guessBtn').style.display='none';document.getElementById('loginBtn').style.display='inline-block';}catch(e){alert('Failed to fetch user ID');}
};
document.getElementById('loginBtn').onclick=()=>{
const username=document.getElementById('loginUsername').value.trim();
const id=document.getElementById('loginUserID').value.trim();
if(!username||!id)return alert('Invalid login');alert('Logged in as '+username);document.getElementById('loginBox').style.display='none';
};
showSection('homepage');
})();
</script>
</body>
</html>
