<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrabVR Terminal</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff88;
  font-family: monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.header {
  text-align: center;
  margin-top: 20px;
}

.header h1 {
  margin: 0;
  font-size: 28px;
}

.header span {
  font-size: 12px;
  opacity: 0.7;
}

.container {
  width: 600px;
  max-width: 95%;
  margin-top: 20px;
}

.output {
  background: #000;
  border: 1px solid #00ff88;
  padding: 15px;
  height: 300px;
  overflow-y: auto;
  margin-bottom: 10px;
  white-space: pre-wrap;
}

.input {
  display: flex;
}

input {
  flex: 1;
  background: black;
  border: 1px solid #00ff88;
  color: #00ff88;
  padding: 10px;
  outline: none;
}

button {
  background: #00ff88;
  color: black;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
}

img {
  margin-top: 10px;
  max-width: 100%;
  border: 1px solid #00ff88;
}

.footer {
  margin-top: 15px;
  text-align: center;
  font-size: 12px;
  color: #00ff88;
}

.footer a {
  color: #00ff88;
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="header">
  <h1>GrabVR Terminal</h1>
  <span>V1</span>
</div>

<div class="container">
  <div class="output" id="output"></div>

  <div class="input">
    <input id="linkInput" placeholder="Enter Grab level link...">
    <button onclick="run()">EXEC</button>
  </div>

  <div class="footer">
    made by ivy • by love from poizonTools team • 
    <a href="https://discord.gg/G6aNgvM7j9" target="_blank">discord.gg/G6aNgvM7j9</a>
    <br>© 2026
  </div>
</div>

<script>
function log(msg, id=null) {
  const output = document.getElementById('output');
  const time = new Date().toLocaleTimeString();

  if (id) {
    const div = document.createElement("div");
    div.id = id;
    div.textContent = `[${time}] ${msg}`;
    output.appendChild(div);
  } else {
    output.innerHTML += `[${time}] ${msg}\n`;
  }

  output.scrollTop = output.scrollHeight;
}

function updateLog(id, newMsg) {
  const el = document.getElementById(id);
  if (el) {
    const time = new Date().toLocaleTimeString();
    el.textContent = `[${time}] ${newMsg}`;
  }
}

function extractIDs(link) {
  try {
    const url = new URL(link);
    const levelParam = url.searchParams.get('level');
    if (!levelParam) return null;
    const parts = levelParam.split(':');
    if (parts.length < 2) return null;
    return { userID: parts[0], timestamp: parts[1] };
  } catch {
    return null;
  }
}

async function run() {
  const input = document.getElementById('linkInput').value.trim();

  if (!input) {
    log("No input provided");
    return;
  }

  log("Parsing input...");
  const ids = extractIDs(input);

  if (!ids) {
    log("Failed to extract level ID");
    return;
  }

  const { userID, timestamp } = ids;
  log(`User ID: ${userID}`);
  log(`Level Timestamp: ${timestamp}`);

  log("Fetching Private API..");

  // build working download URL
  const downloadURL = `https://api.slin.dev/grab/v1/download/${userID}/${timestamp}/1`;

  // Start download immediately
  const a = document.createElement('a');
  a.href = downloadURL;
  a.download = `${timestamp}.level`;
  a.click();
  log("Download started");

  try {
    // fetch info separately
    const infoURL = `https://api.slin.dev/grab/v1/level/${userID}:${timestamp}`;
    const res = await fetch(infoURL);
    if (!res.ok) throw new Error();

    const data = await res.json();
    const name = data.name || "unknown_level";
    const image = data.image || "";

    log(`Level Name: ${name}`);
    log("Checking version...", "versionLine");
    updateLog("versionLine", `Resolved filename: ${timestamp}.level`);

    if (image) {
      const img = document.createElement("img");
      img.src = image;
      document.getElementById('output').appendChild(img);
    }

  } catch {
    log("Failed to fetch level info (download already started)");
  }
}
</script>

</body>
</html>
